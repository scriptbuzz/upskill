<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">App Integration &amp; Decoupling</text>
  <rect x="50" y="160" width="160" height="120" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="70" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Order Service</text>
  
  <g transform="translate(115,220)">
    <rect x="0" y="0" width="30" height="12" rx="2" fill="none" stroke="url(#cloud-blue)" stroke-width="2"/>
    <circle cx="5" cy="6" r="1.5" fill="url(#cloud-blue)"/>
    <line x1="12" y1="6" x2="25" y2="6" stroke="url(#cloud-blue)" stroke-width="2"/>
    
    <rect x="0" y="16" width="30" height="12" rx="2" fill="none" stroke="url(#cloud-blue)" stroke-width="2"/>
    <circle cx="5" cy="22" r="1.5" fill="url(#cloud-blue)"/>
    <line x1="12" y1="22" x2="25" y2="22" stroke="url(#cloud-blue)" stroke-width="2"/>
  </g>  <rect x="270" y="160" width="180" height="120" rx="12" fill="rgba(255,153,0,0.03)" stroke="#FF9900" stroke-width="1.5" />
  <text x="290" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">SQS Message Queue</text>
  <text x="290" y="215" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Decouples microservices</text>
<rect x="330" y="235" width="60" height="35" rx="3" fill="none" stroke="#FF9900" stroke-width="2" /><line x1="330" y1="235" x2="360" y2="255" stroke="#FF9900" stroke-width="1.5" /><line x1="390" y1="235" x2="360" y2="255" stroke="#FF9900" stroke-width="1.5" />  <rect x="520" y="160" width="200" height="120" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="540" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Processing Workers</text>
  
  <g transform="translate(605,220)">
    <rect x="0" y="0" width="30" height="12" rx="2" fill="none" stroke="url(#cloud-blue)" stroke-width="2"/>
    <circle cx="5" cy="6" r="1.5" fill="url(#cloud-blue)"/>
    <line x1="12" y1="6" x2="25" y2="6" stroke="url(#cloud-blue)" stroke-width="2"/>
    
    <rect x="0" y="16" width="30" height="12" rx="2" fill="none" stroke="url(#cloud-blue)" stroke-width="2"/>
    <circle cx="5" cy="22" r="1.5" fill="url(#cloud-blue)"/>
    <line x1="12" y1="22" x2="25" y2="22" stroke="url(#cloud-blue)" stroke-width="2"/>
  </g>  <line x1="210" y1="220" x2="270" y2="220" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 270 220 L 263.0717967697245 224.0 L 263.0717967697245 216.0 Z" fill="url(#aws-orange)" />
  
  <line x1="450" y1="220" x2="520" y2="220" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 520 220 L 513.0717967697245 224.0 L 513.0717967697245 216.0 Z" fill="url(#aws-orange)" />
  
</svg>