<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80.0" cy="90.0" r="240.0" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720.0" cy="360.0" r="240.0" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">IAM Access Entities</text>
  <rect x="60" y="120" width="220" height="240" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="80" y="155" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">IAM Group (Devs)</text>
  
  <g transform="translate(160,190)">
    <circle cx="10" cy="8" r="6" fill="none" stroke="#F8FAFC" stroke-width="2"/>
    <path d="M 0 22 C 0 16, 20 16, 20 22" fill="none" stroke="#F8FAFC" stroke-width="2"/>
  </g>  <g transform="translate(160,270)">
    <circle cx="10" cy="8" r="6" fill="none" stroke="#F8FAFC" stroke-width="2"/>
    <path d="M 0 22 C 0 16, 20 16, 20 22" fill="none" stroke="#F8FAFC" stroke-width="2"/>
  </g>  <rect x="320" y="120" width="180" height="240" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="340" y="155" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">IAM Role</text>
  
<circle cx="410" cy="220" r="30" fill="none" stroke="#FF9900" stroke-width="2" /><text x="410" y="225" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#FF9900" text-anchor="middle">AWS STS</text>  <rect x="560" y="120" width="180" height="240" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="580" y="155" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">S3 Bucket Target</text>
  
<rect x="630" y="210" width="40" height="50" rx="4" fill="none" stroke="#00A3E0" stroke-width="2" /><text x="650" y="240" font-family="Inter, sans-serif" font-size="12" fill="#00A3E0" text-anchor="middle">S3</text>  <line x1="280" y1="220" x2="320" y2="220" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 320 220 L 313.0717967697245 224.0 L 313.0717967697245 216.0 Z" fill="url(#aws-orange)" />
  <text x="300.0" y="212.0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Assume</text>
  <line x1="500" y1="220" x2="560" y2="220" stroke="#10B981" stroke-width="2"  />
  <path d="M 560 220 L 553.0717967697245 224.0 L 553.0717967697245 216.0 Z" fill="#10B981" />
  <text x="530.0" y="212.0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Access</text>
</svg>