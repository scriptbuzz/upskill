<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Data Classification Tiers</text>
  <rect x="60" y="100" width="160" height="170" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="80" y="130" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">Public</text>
  <text x="80" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Safe to disclose:<tspan x="80" dy="14">docs, marketing</tspan></text>
  <g stroke="#10B981" stroke-width="2" fill="none">
    <circle cx="140" cy="220" r="18"/>
    <ellipse cx="140" cy="220" rx="8" ry="18"/>
    <line x1="122" y1="220" x2="158" y2="220"/>
  </g>
  <rect x="240" y="100" width="160" height="170" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="260" y="130" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">Internal</text>
  <text x="260" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Limited business<tspan x="260" dy="14">distribution</tspan></text>
  <g stroke="#00A3E0" stroke-width="2" fill="none">
    <rect x="306" y="202" width="28" height="36" rx="2"/>
    <line x1="314" y1="210" x2="326" y2="210"/>
    <line x1="314" y1="218" x2="326" y2="218"/>
    <line x1="314" y1="226" x2="326" y2="226"/>
  </g>
  <rect x="420" y="100" width="160" height="170" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="440" y="130" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">Confidential</text>
  <text x="440" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">PII &amp; financials.<tspan x="440" dy="14">Encrypt + control</tspan></text>
  <g stroke="#FF9900" stroke-width="2" fill="none">
    <rect x="487" y="214" width="26" height="22" rx="3"/>
    <path d="M 492 214 L 492 207 A 8 8 0 0 1 508 207 L 508 214"/>
    <circle cx="500" cy="224" r="2.5" fill="#FF9900"/>
  </g>
  <rect x="600" y="100" width="160" height="170" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="620" y="130" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">Restricted</text>
  <text x="620" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Regulated secrets.<tspan x="620" dy="14">Maximum controls</tspan></text>
  <g stroke="#EF4444" stroke-width="2" fill="none">
    <path d="M 680 202 L 695 209 L 695 222 Q 695 234 680 238 Q 665 234 665 222 L 665 209 Z"/>
    <path d="M 674 220 L 679 225 L 687 214" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <line x1="60" y1="310" x2="740" y2="310" stroke="#FF9900" stroke-width="2" stroke-linecap="round"/>
  <path d="M 740 310 L 733 306 L 733 314 Z" fill="#FF9900"/>
  <text x="400" y="335" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#94A3B8" text-anchor="middle">Increasing sensitivity → stronger controls</text>
  <text x="400" y="385" font-family="Inter, system-ui, sans-serif" font-size="11.5" fill="#CBD5E1" text-anchor="middle">Label with <tspan font-weight="700" fill="#FF9900">Tags</tspan>  •  Encrypt with <tspan font-weight="700" fill="#00A3E0">AWS KMS</tspan>  •  Auto-discover with <tspan font-weight="700" fill="#10B981">Amazon Macie</tspan></text>
</svg>
