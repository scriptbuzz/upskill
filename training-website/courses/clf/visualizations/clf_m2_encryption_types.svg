<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80.0" cy="90.0" r="240.0" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720.0" cy="360.0" r="240.0" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Data Protection: In-Transit vs. At-Rest</text>
  <rect x="40" y="160" width="160" height="120" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Client Laptop</text>
  
  <g transform="translate(110,220)">
    <circle cx="10" cy="8" r="6" fill="none" stroke="#F8FAFC" stroke-width="2"/>
    <path d="M 0 22 C 0 16, 20 16, 20 22" fill="none" stroke="#F8FAFC" stroke-width="2"/>
  </g>  <rect x="270" y="160" width="180" height="120" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="290" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Server Load Balancer</text>
  
  <g transform="translate(350,220)">
    <rect x="0" y="10" width="20" height="15" rx="3" fill="none" stroke="#10B981" stroke-width="2"/>
    <path d="M 4 10 L 4 6 A 6 6 0 0 1 16 6 L 16 10" fill="none" stroke="#10B981" stroke-width="2"/>
  </g>  <line x1="200" y1="220" x2="270" y2="220" stroke="#10B981" stroke-width="2"  />
  <path d="M 270 220 L 263.0717967697245 224.0 L 263.0717967697245 216.0 Z" fill="#10B981" />
  <text x="235.0" y="212.0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">HTTPS / TLS (ACM)</text>
  <rect x="540" y="160" width="200" height="120" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="560" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">AWS Database (RDS)</text>
  
  <g transform="translate(628,220)">
    <path d="M 0 8 C 0 2, 24 2, 24 8 C 24 14, 0 14, 0 8 Z" fill="none" stroke="url(#aws-orange)" stroke-width="2"/>
    <path d="M 0 8 L 0 16 C 0 22, 24 22, 24 16 L 24 8" fill="none" stroke="url(#aws-orange)" stroke-width="2"/>
    <path d="M 0 16 L 0 24 C 0 30, 24 30, 24 24 L 24 16" fill="none" stroke="url(#aws-orange)" stroke-width="2"/>
  </g><circle cx="680" cy="205" r="10" fill="#FF9900" /><rect x="677" y="215" width="6" height="15" fill="#FF9900" />  <line x1="450" y1="220" x2="540" y2="220" stroke="#FF9900" stroke-width="2"  />
  <path d="M 540 220 L 533.0717967697245 224.0 L 533.0717967697245 216.0 Z" fill="#FF9900" />
  <text x="495.0" y="212.0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">KMS Encrypted</text>
</svg>