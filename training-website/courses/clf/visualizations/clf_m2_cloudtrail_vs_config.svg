<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Auditing &amp; Compliance: CloudTrail vs. Config</text>
  <rect x="60" y="110" width="310" height="260" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="80" y="145" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">AWS CloudTrail (Who did it?)</text>
  

  <g transform="translate(80, 185)">
    <text x="0" y="15" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC">■ Records all AWS API activities</text>
    <text x="0" y="45" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC">■ Answers: Who, What, When, Where?</text>
    <text x="0" y="75" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC">■ Logs CLI, console, and SDK commands</text>
    <text x="0" y="105" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC">■ Saves audit logs in secure S3 storage</text>
    <text x="0" y="145" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">Example: John Roberts deleted RDS DB</text>
  </g>
  <rect x="430" y="110" width="310" height="260" rx="12" fill="rgba(255,153,0,0.02)" stroke="#FF9900" stroke-width="1.5" />
  <text x="450" y="145" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">AWS Config (Is it compliant?)</text>
  

  <g transform="translate(450, 185)">
    <text x="0" y="15" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC">■ Records configuration change history</text>
    <text x="0" y="45" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC">■ Compares setups to compliance rules</text>
    <text x="0" y="75" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC">■ Triggers alerts on configuration drift</text>
    <text x="0" y="105" font-family="Inter, sans-serif" font-size="13" fill="#F8FAFC">■ Automates resource remediation steps</text>
    <text x="0" y="145" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">Example: Public S3 bucket detected &amp; blocked</text>
  </g>
</svg>