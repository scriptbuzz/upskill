    <path d="M 0 16 L 0 24 C 0 30, 24 30, 24 24 L 24 16" fill="none" stroke="url(#aws-orange)" stroke-width="2"/>
  </g>  <rect x="580" y="160" width="175" height="120" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="600" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">4. Query &amp; Visualize</text>
  <text x="600" y="215" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">QuickSight / Athena / OS</text>
<path d="M 610 255 L 650 220 L 690 235 L 720 205" fill="none" stroke="#10B981" stroke-width="2" />  <line x1="190" y1="220" x2="210" y2="220" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 210 220 L 203.0717967697245 224.0 L 203.0717967697245 216.0 Z" fill="url(#aws-orange)" />
  
