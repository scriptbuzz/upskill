<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">VPC Architecture and Isolation</text>
  <rect x="60" y="100" width="680" height="270" rx="12" fill="rgba(0,163,224,0.01)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="80" y="135" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Virtual Private Cloud (VPC)</text>
  <text x="80" y="155" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Private Isolated Cloud Network</text>
  <rect x="90" y="170" width="290" height="170" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="110" y="205" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Public Subnet (IGW Route)</text>
  
  <g transform="translate(130,250)">
    <rect x="0" y="0" width="30" height="12" rx="2" fill="none" stroke="url(#cloud-blue)" stroke-width="2"/>
    <circle cx="5" cy="6" r="1.5" fill="url(#cloud-blue)"/>
    <line x1="12" y1="6" x2="25" y2="6" stroke="url(#cloud-blue)" stroke-width="2"/>
    
    <rect x="0" y="16" width="30" height="12" rx="2" fill="none" stroke="url(#cloud-blue)" stroke-width="2"/>
    <circle cx="5" cy="22" r="1.5" fill="url(#cloud-blue)"/>
    <line x1="12" y1="22" x2="25" y2="22" stroke="url(#cloud-blue)" stroke-width="2"/>
  </g><rect x="250" y="240" width="100" height="40" rx="4" fill="none" stroke="#00A3E0" stroke-width="2" /><text x="300" y="265" font-family="Inter, sans-serif" font-size="11" fill="#00A3E0" text-anchor="middle">IGW Route</text>  <rect x="420" y="170" width="290" height="170" rx="12" fill="rgba(245,158,11,0.02)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="440" y="205" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Private Subnet (Isolated)</text>
  
  <g transform="translate(550,250)">
    <path d="M 0 8 C 0 2, 24 2, 24 8 C 24 14, 0 14, 0 8 Z" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <path d="M 0 8 L 0 16 C 0 22, 24 22, 24 16 L 24 8" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <path d="M 0 16 L 0 24 C 0 30, 24 30, 24 24 L 24 16" fill="none" stroke="#F59E0B" stroke-width="2"/>
  </g></svg>