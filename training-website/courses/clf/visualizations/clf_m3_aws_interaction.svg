<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Interacting with AWS</text>
  <rect x="50" y="130" width="210" height="220" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="70" y="165" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Management Console</text>
  
<rect x="90" y="190" width="130" height="90" fill="none" stroke="#00A3E0" stroke-width="2" /><text x="155" y="240" font-family="Inter, sans-serif" font-size="11" fill="#00A3E0" text-anchor="middle">Graphical Console (GUI)</text>  <rect x="290" y="130" width="220" height="220" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="310" y="165" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">AWS CLI (Command Line)</text>
  
<rect x="310" y="190" width="180" height="90" fill="#1E293B" stroke="#1E293B" /><text x="320" y="220" font-family="monospace" font-size="11" fill="#10B981">$ aws ec2 run-instances</text>  <rect x="540" y="130" width="210" height="220" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="560" y="165" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC" textLength="185" lengthAdjust="spacingAndGlyphs">AWS SDKs (Language Libs)</text>
  
<rect x="560" y="190" width="170" height="90" fill="#1E293B" stroke="#1E293B" /><text x="570" y="220" font-family="monospace" font-size="11" fill="#FF9900">import boto3</text><text x="570" y="240" font-family="monospace" font-size="10" fill="#FF9900" textLength="138" lengthAdjust="spacingAndGlyphs">client = boto3.client('s3')</text></svg>