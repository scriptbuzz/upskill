<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Time Management Mockup</text>
  <rect x="150" y="100" width="500" height="250" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="170" y="135" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Question 1 of 65 (90 mins total)</text>
  <text x="170" y="155" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Identify key phrases &amp; eliminate options</text>

  <g transform="translate(170, 190)">
    <rect x="0" y="0" width="16" height="16" rx="4" fill="none" stroke="#F8FAFC" stroke-width="2"/>
    <text x="25" y="13" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC">A: Wrong option (Eliminated)</text>
    <line x1="25" y1="9" x2="180" y2="9" stroke="#EF4444" stroke-width="1.5" />
    
    <rect x="0" y="30" width="16" height="16" rx="4" fill="none" stroke="#F8FAFC" stroke-width="2"/>
    <text x="25" y="43" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC">B: Best guess option (Select)</text>
  </g>
  <g transform="translate(500, 120)">
    <rect x="0" y="0" width="120" height="30" rx="4" fill="#FF9900" />
    <text x="60" y="19" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">Flag for Review</text>
  </g>
</svg>