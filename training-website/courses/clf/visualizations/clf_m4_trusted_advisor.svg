<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">AWS Trusted Advisor Categories</text>
<rect x="60" y="160" width="105" height="150" rx="8" fill="url(#dark-card)" stroke="#EF4444" stroke-width="2" /><text x="112" y="232" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">Cost</text><text x="112" y="248" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">Optimization</text><rect x="175" y="160" width="105" height="150" rx="8" fill="url(#dark-card)" stroke="#10B981" stroke-width="2" /><text x="227" y="240" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">Security</text><rect x="290" y="160" width="105" height="150" rx="8" fill="url(#dark-card)" stroke="#F59E0B" stroke-width="2" /><text x="342" y="232" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">Fault</text><text x="342" y="248" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">Tolerance</text><rect x="405" y="160" width="105" height="150" rx="8" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="2" /><text x="457" y="240" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">Performance</text><rect x="520" y="160" width="105" height="150" rx="8" fill="url(#dark-card)" stroke="#1D70B8" stroke-width="2" /><text x="572" y="232" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">Operational</text><text x="572" y="248" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">Excellence</text><rect x="635" y="160" width="105" height="150" rx="8" fill="url(#dark-card)" stroke="#94A3B8" stroke-width="2" /><text x="687" y="232" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">Service</text><text x="687" y="248" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">Limits</text></svg>