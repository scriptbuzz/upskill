  </g>  <line x1="400" y1="210" x2="400" y2="235" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 400 235 L 396.0 228.0717967697245 L 404.0 228.0717967697245 Z" fill="url(#aws-orange)" />
  
  <rect x="540" y="120" width="210" height="240" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="560" y="155" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">On-Premises Private Cloud</text>
  
  <g transform="translate(630,190)">
    <rect x="0" y="0" width="30" height="12" rx="2" fill="none" stroke="#94A3B8" stroke-width="2"/>
    <circle cx="5" cy="6" r="1.5" fill="#94A3B8"/>
    <line x1="12" y1="6" x2="25" y2="6" stroke="#94A3B8" stroke-width="2"/>
    
    <rect x="0" y="16" width="30" height="12" rx="2" fill="none" stroke="#94A3B8" stroke-width="2"/>
    <circle cx="5" cy="22" r="1.5" fill="#94A3B8"/>
    <line x1="12" y1="22" x2="25" y2="22" stroke="#94A3B8" stroke-width="2"/>
