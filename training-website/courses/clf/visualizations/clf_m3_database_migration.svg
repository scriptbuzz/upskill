<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Database Migration: SCT &amp; DMS</text>
  <rect x="60" y="160" width="180" height="120" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="80" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC" textLength="155" lengthAdjust="spacingAndGlyphs">On-Premises Database</text>
  <text x="80" y="215" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Oracle / SQL Server</text>
  <g transform="translate(138,220)">
    <path d="M 0 8 C 0 2, 24 2, 24 8 C 24 14, 0 14, 0 8 Z" fill="none" stroke="url(#aws-orange)" stroke-width="2"/>
    <path d="M 0 8 L 0 16 C 0 22, 24 22, 24 16 L 24 8" fill="none" stroke="url(#aws-orange)" stroke-width="2"/>
    <path d="M 0 16 L 0 24 C 0 30, 24 30, 24 24 L 24 16" fill="none" stroke="url(#aws-orange)" stroke-width="2"/>
  </g>  <rect x="290" y="120" width="210" height="200" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="310" y="155" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">AWS Migration Hub</text>
  <text x="310" y="175" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">SCT conversion + DMS replication</text>
  <line x1="395" y1="230" x2="395" y2="290" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 395 290 L 391.0 283.0717967697245 L 399.0 283.0717967697245 Z" fill="url(#aws-orange)" />
  <text x="395.0" y="252.0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">DMS Sync</text>
  <rect x="550" y="160" width="190" height="120" rx="12" fill="rgba(16,185,129,0.02)" stroke="#10B981" stroke-width="1.5" />
  <text x="570" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Target DB in AWS</text>
  <text x="570" y="215" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">PostgreSQL / Aurora</text>
  <g transform="translate(630,220)">
    <path d="M 0 8 C 0 2, 24 2, 24 8 C 24 14, 0 14, 0 8 Z" fill="none" stroke="#10B981" stroke-width="2"/>
    <path d="M 0 8 L 0 16 C 0 22, 24 22, 24 16 L 24 8" fill="none" stroke="#10B981" stroke-width="2"/>
    <path d="M 0 16 L 0 24 C 0 30, 24 30, 24 24 L 24 16" fill="none" stroke="#10B981" stroke-width="2"/>
  </g>  <line x1="240" y1="220" x2="290" y2="220" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 290 220 L 283.0717967697245 224.0 L 283.0717967697245 216.0 Z" fill="url(#aws-orange)" />
  
  <line x1="500" y1="220" x2="550" y2="220" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 550 220 L 543.0717967697245 224.0 L 543.0717967697245 216.0 Z" fill="url(#aws-orange)" />
  
</svg>