  <text x="460" y="115" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Availability Zone A (Primary)</text>
  <text x="460" y="135" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Active Site</text>
  <g transform="translate(620,130)">
    <rect x="0" y="0" width="30" height="12" rx="2" fill="none" stroke="#10B981" stroke-width="2"/>
    <circle cx="5" cy="6" r="1.5" fill="#10B981"/>
    <line x1="12" y1="6" x2="25" y2="6" stroke="#10B981" stroke-width="2"/>
    
    <rect x="0" y="16" width="30" height="12" rx="2" fill="none" stroke="#10B981" stroke-width="2"/>
