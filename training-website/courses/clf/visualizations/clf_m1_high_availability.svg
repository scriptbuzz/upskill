  <path d="M 230 225 L 223.0717967697245 229.0 L 223.0717967697245 221.0 Z" fill="url(#aws-orange)" />
  
  <line x1="390" y1="200" x2="440" y2="140" stroke="#10B981" stroke-width="2"  />
