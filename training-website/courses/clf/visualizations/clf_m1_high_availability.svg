    <line x1="12" y1="22" x2="25" y2="22" stroke="#10B981" stroke-width="2"/>
  </g>  <rect x="440" y="240" width="320" height="130" rx="12" fill="rgba(245, 158, 11, 0.03)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="460" y="275" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Availability Zone B (Standby)</text>
  <text x="460" y="295" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Automatic Failover Target</text>
  <g transform="translate(620,290)">
    <rect x="0" y="0" width="30" height="12" rx="2" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="5" cy="6" r="1.5" fill="#F59E0B"/>
    <line x1="12" y1="6" x2="25" y2="6" stroke="#F59E0B" stroke-width="2"/>
    
    <rect x="0" y="16" width="30" height="12" rx="2" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="5" cy="22" r="1.5" fill="#F59E0B"/>
    <line x1="12" y1="22" x2="25" y2="22" stroke="#F59E0B" stroke-width="2"/>
