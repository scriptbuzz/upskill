<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Amazon EC2 Instance Families</text>
  <rect x="60" y="120" width="210" height="110" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="80" y="155" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">General Purpose (t4g/m5)</text>
  
<text x="80" y="200" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC">■ Balanced Compute, RAM &amp; Net</text>  <rect x="290" y="120" width="220" height="110" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="310" y="155" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Compute Optimized (c8g)</text>
  
<text x="310" y="200" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC">■ Powerful CPUs (encoding/batch)</text>  <rect x="530" y="120" width="210" height="110" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="550" y="155" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Memory Optimized (r8g)</text>
  
<text x="550" y="200" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC">■ Large RAM (in-memory DBs)</text>  <rect x="60" y="260" width="210" height="110" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="80" y="295" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Accelerated Compute (g6)</text>
  
<text x="80" y="340" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC" textLength="185" lengthAdjust="spacingAndGlyphs">■ GPUs for graphics and ML training</text>  <rect x="290" y="260" width="220" height="110" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="310" y="295" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Storage Optimized (i8g)</text>
  
<text x="310" y="340" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC">■ Direct SSD access for caching</text>  <rect x="530" y="260" width="210" height="110" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="550" y="295" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">HPC Optimized (hpc7a)</text>
  
<text x="550" y="340" font-family="Inter, sans-serif" font-size="12" fill="#F8FAFC">■ Built for massive parallel clusters</text></svg>