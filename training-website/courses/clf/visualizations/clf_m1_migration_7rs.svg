<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80.0" cy="90.0" r="240.0" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720.0" cy="360.0" r="240.0" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Migration Strategies (The 7 Rs)</text>
  <line x1="60" y1="380" x2="750" y2="380" stroke="#F8FAFC" stroke-width="2"  />
  <path d="M 750 380 L 743.0717967697245 384.0 L 743.0717967697245 376.0 Z" fill="#F8FAFC" />
  <text x="405.0" y="372.0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Complexity / Effort →</text>
  <line x1="60" y1="380" x2="60" y2="80" stroke="#F8FAFC" stroke-width="2"  />
  <path d="M 60 80 L 64.0 86.92820323027551 L 56.0 86.92820323027551 Z" fill="#F8FAFC" />
  <text x="60.0" y="222.0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Cloud-Native Benefits ↑</text>
<rect x="60" y="360" width="90" height="30" rx="6" fill="#EF4444" stroke="#1E293B" stroke-width="1.5" /><text x="100" y="379" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">Retire</text><rect x="140" y="320" width="90" height="30" rx="6" fill="#94A3B8" stroke="#1E293B" stroke-width="1.5" /><text x="180" y="339" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">Retain</text><rect x="240" y="280" width="90" height="30" rx="6" fill="#00A3E0" stroke="#1E293B" stroke-width="1.5" /><text x="280" y="299" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">Rehost</text><rect x="340" y="240" width="90" height="30" rx="6" fill="#1D70B8" stroke="#1E293B" stroke-width="1.5" /><text x="380" y="259" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">Relocate</text><rect x="440" y="200" width="90" height="30" rx="6" fill="#F59E0B" stroke="#1E293B" stroke-width="1.5" /><text x="480" y="219" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">Replatform</text><rect x="540" y="160" width="90" height="30" rx="6" fill="#FF9900" stroke="#1E293B" stroke-width="1.5" /><text x="580" y="179" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">Repurchase</text><rect x="640" y="120" width="90" height="30" rx="6" fill="#10B981" stroke="#1E293B" stroke-width="1.5" /><text x="680" y="139" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">Refactor</text></svg>