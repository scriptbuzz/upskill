<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Threat Detection &amp; Intelligence</text>
  <rect x="50" y="140" width="200" height="160" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="70" y="175" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">1. Vulnerability Scan</text>
  <text x="70" y="195" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Amazon Inspector</text>
  <g transform="translate(135,226)">
    <polygon points="12,2 22,20 2,20" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <line x1="12" y1="8" x2="12" y2="14" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="12" cy="17" r="1.5" fill="#F59E0B"/>
  </g>  <rect x="290" y="140" width="220" height="160" rx="12" fill="rgba(239, 68, 68, 0.02)" stroke="#EF4444" stroke-width="1.5" />
  <text x="310" y="175" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">2. Threat Monitor</text>
  <text x="310" y="195" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Amazon GuardDuty</text>
  <g transform="translate(385,226)">
    <path d="M 0 0 L 12 0 C 12 0, 24 8, 24 18 C 24 26, 12 32, 12 32 C 12 32, 0 26, 0 18 Z" fill="none" stroke="#EF4444" stroke-width="2"/>
  </g>  <rect x="550" y="140" width="200" height="160" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="570" y="175" font-family="Inter, system-ui, sans-serif" font-size="13.5" font-weight="600" fill="#F8FAFC" textLength="168" lengthAdjust="spacingAndGlyphs">3. Root Cause Investigation</text>
  <text x="570" y="195" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Amazon Detective</text>
  <g transform="translate(635,226)">
    <circle cx="15" cy="15" r="14" fill="none" stroke="#00A3E0" stroke-width="2"/>
    <ellipse cx="15" cy="15" rx="14" ry="5" fill="none" stroke="#00A3E0" stroke-width="1.5"/>
    <ellipse cx="15" cy="15" rx="5" ry="14" fill="none" stroke="#00A3E0" stroke-width="1.5"/>
    <line x1="15" y1="1" x2="15" y2="29" stroke="#00A3E0" stroke-width="1.5"/>
    <line x1="1" y1="15" x2="29" y2="15" stroke="#00A3E0" stroke-width="1.5"/>
  </g>  <line x1="250" y1="220" x2="290" y2="220" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 290 220 L 283.0717967697245 224.0 L 283.0717967697245 216.0 Z" fill="url(#aws-orange)" />
  
  <line x1="510" y1="220" x2="550" y2="220" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 550 220 L 543.0717967697245 224.0 L 543.0717967697245 216.0 Z" fill="url(#aws-orange)" />
  
</svg>