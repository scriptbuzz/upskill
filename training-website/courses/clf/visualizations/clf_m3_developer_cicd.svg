<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Developer CI/CD Pipeline</text>
  <rect x="60" y="160" width="140" height="110" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="80" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">1. Code Commit</text>
  
  <g transform="translate(120,228)">
    <circle cx="10" cy="8" r="6" fill="none" stroke="#F8FAFC" stroke-width="2"/>
    <path d="M 0 22 C 0 16, 20 16, 20 22" fill="none" stroke="#F8FAFC" stroke-width="2"/>
  </g>  <rect x="230" y="160" width="150" height="110" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="250" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">2. CodeBuild</text>
  <text x="250" y="215" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Tests &amp; Compiles</text>
  <g transform="translate(290,228)">
    <rect x="0" y="0" width="30" height="12" rx="2" fill="none" stroke="url(#cloud-blue)" stroke-width="2"/>
    <circle cx="5" cy="6" r="1.5" fill="url(#cloud-blue)"/>
    <line x1="12" y1="6" x2="25" y2="6" stroke="url(#cloud-blue)" stroke-width="2"/>
    
    <rect x="0" y="16" width="30" height="12" rx="2" fill="none" stroke="url(#cloud-blue)" stroke-width="2"/>
    <circle cx="5" cy="22" r="1.5" fill="url(#cloud-blue)"/>
    <line x1="12" y1="22" x2="25" y2="22" stroke="url(#cloud-blue)" stroke-width="2"/>
  </g>  <rect x="410" y="160" width="160" height="110" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="430" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">3. CodePipeline</text>
  <text x="430" y="215" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Continuous Delivery</text>
  <g transform="translate(470,228)">
    <path d="M 5 15 A 8 8 0 0 1 18 8 A 10 10 0 0 1 36 12 A 7 7 0 0 1 38 22 L 8 22 A 6 6 0 0 1 5 15 Z" fill="none" stroke="url(#cloud-blue)" stroke-width="2"/>
  </g>  <rect x="600" y="160" width="140" height="110" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="620" y="195" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC" textLength="115" lengthAdjust="spacingAndGlyphs">4. Monitor (X-Ray)</text>
  
  <g transform="translate(655,228)">
    <circle cx="15" cy="15" r="14" fill="none" stroke="#10B981" stroke-width="2"/>
    <ellipse cx="15" cy="15" rx="14" ry="5" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <ellipse cx="15" cy="15" rx="5" ry="14" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <line x1="15" y1="1" x2="15" y2="29" stroke="#10B981" stroke-width="1.5"/>
    <line x1="1" y1="15" x2="29" y2="15" stroke="#10B981" stroke-width="1.5"/>
  </g>  <line x1="200" y1="215" x2="230" y2="215" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 230 215 L 223.0717967697245 219.0 L 223.0717967697245 211.0 Z" fill="url(#aws-orange)" />
  
  <line x1="380" y1="215" x2="410" y2="215" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 410 215 L 403.0717967697245 219.0 L 403.0717967697245 211.0 Z" fill="url(#aws-orange)" />
  
  <line x1="570" y1="215" x2="600" y2="215" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 600 215 L 593.0717967697245 219.0 L 593.0717967697245 211.0 Z" fill="url(#aws-orange)" />
  
</svg>