<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Rightsizing Compute</text>
  <line x1="60" y1="360" x2="740" y2="360" stroke="#F8FAFC" stroke-width="2"  />
  <path d="M 740 360 L 733.0717967697245 364.0 L 733.0717967697245 356.0 Z" fill="#F8FAFC" />
  <text x="400.0" y="352.0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Workload Demand Time →</text>
  <line x1="60" y1="360" x2="60" y2="80" stroke="#F8FAFC" stroke-width="2"  />
  <path d="M 60 80 L 64.0 86.92820323027551 L 56.0 86.92820323027551 Z" fill="#F8FAFC" />
  <text x="60.0" y="212.0" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Compute Capacity ↑</text>
<line x1="60" y1="120" x2="720" y2="120" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="8,8" /><text x="715" y="112" font-family="Inter, sans-serif" font-size="12" fill="#EF4444" font-weight="600" text-anchor="end">Over-provisioned</text><line x1="60" y1="280" x2="720" y2="280" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="8,8" /><text x="715" y="300" font-family="Inter, sans-serif" font-size="12" fill="#EF4444" font-weight="600" text-anchor="end">Under-provisioned</text><path d="M 60 220 Q 150 160, 240 220 T 420 220 T 600 220 T 720 220" fill="none" stroke="#00A3E0" stroke-width="3" /><text x="650" y="195" font-family="Inter, sans-serif" font-size="12" fill="#00A3E0" font-weight="600">Actual Demand</text><path d="M 60 210 L 150 150 L 240 210 L 335 150 L 420 210 L 510 150 L 600 210 L 720 210" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4" /><text x="650" y="145" font-family="Inter, sans-serif" font-size="12" fill="#10B981" font-weight="600">Rightsized Capacity</text></svg>