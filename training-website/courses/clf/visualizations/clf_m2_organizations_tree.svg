<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80.0" cy="90.0" r="240.0" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720.0" cy="360.0" r="240.0" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header (If provided) -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">AWS Organizations Account Tree</text>
  <rect x="320" y="80" width="160" height="60" rx="12" fill="rgba(255, 153, 0, 0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="340" y="115" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Root Account</text>
  <text x="340" y="135" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Management Hub</text>
  <rect x="160" y="200" width="160" height="70" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="180" y="235" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Development OU</text>
  <text x="180" y="255" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Dev Rules</text>
  <rect x="480" y="200" width="160" height="70" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="500" y="235" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Production OU</text>
  <text x="500" y="255" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Strict SCP Lockout</text>
  <g transform="translate(610,220)">
    <rect x="0" y="10" width="20" height="15" rx="3" fill="none" stroke="url(#alert-red)" stroke-width="2"/>
    <path d="M 4 10 L 4 6 A 6 6 0 0 1 16 6 L 16 10" fill="none" stroke="url(#alert-red)" stroke-width="2"/>
  </g>  <rect x="160" y="320" width="160" height="50" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="180" y="355" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Dev Account 1</text>
  <text x="180" y="375" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Member</text>
  <rect x="480" y="320" width="160" height="50" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="500" y="355" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#F8FAFC">Prod Account 1</text>
  <text x="500" y="375" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">Member</text>
  <line x1="400" y1="140" x2="240" y2="200" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 240 200 L 245.0825850662815 193.82202872748567 L 247.89157259898863 201.31266214803802 Z" fill="url(#aws-orange)" />
  
  <line x1="400" y1="140" x2="560" y2="200" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 560 200 L 552.1084274010113 201.31266214803802 L 554.9174149337185 193.82202872748567 Z" fill="url(#aws-orange)" />
  
  <line x1="240" y1="270" x2="240" y2="320" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 240 320 L 236.0 313.0717967697245 L 244.0 313.0717967697245 Z" fill="url(#aws-orange)" />
  
  <line x1="560" y1="270" x2="560" y2="320" stroke="url(#aws-orange)" stroke-width="2"  />
  <path d="M 560 320 L 556.0 313.0717967697245 L 564.0 313.0717967697245 Z" fill="url(#aws-orange)" />
  
</svg>