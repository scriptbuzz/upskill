<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">S3 Block Public Access Protection</text>
  <text x="760" y="40" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">v0.3 beta | Mikeb</text>
<rect x="600" y="160" width="120" height="100" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="620" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">S3 Bucket</text>
  <text x="620" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Resource policies</text>
    <g transform="translate(645, 215)">
      <path d="M 0,5 Q 15,0 30,5 L 30,25 Q 15,30 0,25 Z" fill="none" stroke="#FF9900" stroke-width="1.5" />
      <path d="M 0,12 Q 15,17 30,12" fill="none" stroke="#FF9900" stroke-width="1.5" />
      <path d="M 0,19 Q 15,24 30,19" fill="none" stroke="#FF9900" stroke-width="1.5" />
    </g>
    <rect x="480" y="110" width="30" height="200" fill="#EF4444" rx="4" filter="url(#glow-orange)" /><text x="495" y="210" font-family="Inter" font-size="11.5" font-weight="700" fill="#000000" text-anchor="middle" transform="rotate(-90 495 210)">BLOCK PUBLIC ACCESS</text><rect x="60" y="100" width="260" height="90" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="80" y="130" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Public Internet User</text>
  <text x="80" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">No credentials auth</text>
    <g transform="translate(80, 140)">
      <circle cx="15" cy="10" r="7" fill="none" stroke="#EF4444" stroke-width="1.5" />
      <path d="M 3,24 Q 15,14 27,24" fill="none" stroke="#EF4444" stroke-width="1.5" />
    </g>
    <line x1="320" y1="145" x2="475" y2="145" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <line x1="475" y1="145" x2="468.0717967697245" y2="149.0" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <line x1="475" y1="145" x2="468.0717967697245" y2="141.0" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <text x="397.5" y="137.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Blocked</text><rect x="60" y="240" width="260" height="90" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">IAM Authenticated Workload</text>
  <text x="80" y="290" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Authorized inside account</text>
    <g transform="translate(80, 280)">
      <circle cx="15" cy="10" r="7" fill="none" stroke="#10B981" stroke-width="1.5" />
      <path d="M 3,24 Q 15,14 27,24" fill="none" stroke="#10B981" stroke-width="1.5" />
    </g>
    <line x1="320" y1="285" x2="595" y2="285" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <line x1="595" y1="285" x2="588.0717967697245" y2="289.0" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <line x1="595" y1="285" x2="588.0717967697245" y2="281.0" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <text x="457.5" y="277.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Allow</text>
</svg>