<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Adversarial Prompt Attack &amp; Mitigations</text>
<rect x="60" y="130" width="240" height="150" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="80" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Adversarial Input Prompt</text>
  <text x="80" y="180" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Jailbreaks, prompt injections</text><text x="180" y="210" font-family="Inter" font-size="12" fill="#EF4444" font-weight="700" text-anchor="middle">"Ignore previous rules"</text><line x1="300" y1="205" x2="410" y2="205" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <line x1="410" y1="205" x2="403.0717967697245" y2="209.0" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <line x1="410" y1="205" x2="403.0717967697245" y2="201.0" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <text x="355.0" y="197.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Attack Vector</text><rect x="410" y="100" width="30" height="210" fill="#EF4444" rx="4" filter="url(#glow-orange)" /><text x="425" y="205" font-family="Inter" font-size="12" font-weight="700" fill="#000000" text-anchor="middle" transform="rotate(-90 425 205)">GUARDRAILS FILTER</text><line x1="440" y1="205" x2="550" y2="205" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <line x1="550" y1="205" x2="543.0717967697245" y2="209.0" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <line x1="550" y1="205" x2="543.0717967697245" y2="201.0" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <text x="495.0" y="197.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Safe Output</text><rect x="550" y="130" width="190" height="150" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="570" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Blocked Response</text>
  <text x="570" y="180" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Fallback text generated</text><text x="645" y="210" font-family="Inter" font-size="11" fill="#10B981" font-weight="700" text-anchor="middle">"I cannot perform this action."</text>
</svg>