<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Trusted Advisor Five Categories Dashboard</text>
  <text x="760" y="40" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">v0.3 beta | Mikeb</text>
<rect x="50" y="150" width="130" height="180" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="70" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Cost Optimization</text>
  <text x="70" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Scan idle DB instances</text><circle cx="115" cy="290" r="15" fill="#10B981" /><path d="M 108,290 L 113,295 L 122,285" fill="none" stroke="#000000" stroke-width="2.5" /><rect x="190" y="150" width="130" height="180" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="210" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Performance</text>
  <text x="210" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Monitor connection limits</text><circle cx="255" cy="290" r="15" fill="#10B981" /><path d="M 248,290 L 253,295 L 262,285" fill="none" stroke="#000000" stroke-width="2.5" /><rect x="330" y="150" width="130" height="180" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="350" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Security Warnings</text>
  <text x="350" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">MFA checks &amp; open ports</text><circle cx="395" cy="290" r="15" fill="#EF4444" filter="url(#glow-orange)" /><text x="395" y="294" font-family="Inter" font-size="12" font-weight="700" fill="#000000" text-anchor="middle">!</text><rect x="470" y="150" width="130" height="180" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="490" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Fault Tolerance</text>
  <text x="490" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Verify S3 backup configs</text><circle cx="535" cy="290" r="15" fill="#10B981" /><path d="M 528,290 L 533,295 L 542,285" fill="none" stroke="#000000" stroke-width="2.5" /><rect x="610" y="150" width="130" height="180" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="630" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Service Limits</text>
  <text x="630" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Track resources quota limits</text><circle cx="675" cy="290" r="15" fill="#10B981" /><path d="M 668,290 L 673,295 L 682,285" fill="none" stroke="#000000" stroke-width="2.5" />
</svg>