<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Amazon Bedrock Model Pricing Comparison</text>
<rect x="60" y="95" width="310" height="290" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="80" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">On-Demand Billing</text>
  <text x="80" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Pay-as-you-go serverless model access</text><rect x="90" y="150" width="250" height="50" rx="12" fill="rgba(0,163,224,0.05)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="110" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Input Tokens</text>
  <text x="110" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">$0.0015 per 1,000 input tokens</text><rect x="90" y="210" width="250" height="50" rx="12" fill="rgba(0,163,224,0.05)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="110" y="240" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Output Tokens</text>
  <text x="110" y="260" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">$0.0020 per 1,000 output tokens</text><rect x="90" y="270" width="250" height="50" rx="12" fill="rgba(0,163,224,0.05)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="110" y="300" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Ideal Use Case</text>
  <text x="110" y="320" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Intermittent workloads, prototyping, development</text><text x="215" y="355" font-family="Inter" font-size="11.5" fill="#10B981" text-anchor="middle">✔ Low initial cost commitment</text><rect x="430" y="95" width="310" height="290" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="450" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Provisioned Throughput</text>
  <text x="450" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Dedicated capacity guarantees</text><rect x="460" y="150" width="250" height="50" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="480" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Dedicated Model Units (MU)</text>
  <text x="480" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Reserved throughput rate limit (tokens/min)</text><rect x="460" y="210" width="250" height="50" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="480" y="240" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Time Commitments</text>
  <text x="480" y="260" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">1-month or 6-month contract terms</text><rect x="460" y="270" width="250" height="50" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="480" y="300" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Ideal Use Case</text>
  <text x="480" y="320" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Production pipelines, strict SLA latency requirements</text><text x="585" y="355" font-family="Inter" font-size="11.5" fill="#10B981" text-anchor="middle">✔ Guaranteed throughput, no cold starts</text>
</svg>