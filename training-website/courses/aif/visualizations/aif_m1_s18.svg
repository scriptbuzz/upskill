<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80.0" cy="90.0" r="240.0" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720.0" cy="360.0" r="240.0" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Classification Performance: The Confusion Matrix</text>
  <rect x="50" y="110" width="330" height="240" rx="12" fill="rgba(239, 68, 68, 0.01)" stroke="#EF4444" stroke-width="1.5" />
  <text x="70" y="145" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">Traditional IT / Local Hosts</text>
  <text x="70" y="165" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">Self-Managed / Manual Operations</text>

  <g transform="translate(70, 180)">
    <text x="0" y="20" font-family="Inter" font-size="12.5" fill="#EF4444">✖ Higher latency / bias risk</text>
    <text x="0" y="55" font-family="Inter" font-size="12.5" fill="#F8FAFC">✖ Complex manual engineering</text>
    <text x="0" y="90" font-family="Inter" font-size="12.5" fill="#F8FAFC">✖ High overhead infrastructure</text>
    <text x="0" y="125" font-family="Inter" font-size="12.5" fill="#F8FAFC">✖ Rigid rules / unscalable</text>
  </g>
  <rect x="420" y="110" width="330" height="240" rx="12" fill="rgba(16, 185, 129, 0.01)" stroke="#10B981" stroke-width="1.5" />
  <text x="440" y="145" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">AWS Managed AI Services</text>
  <text x="440" y="165" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">Optimized Serverless / Secure</text>

  <g transform="translate(440, 180)">
    <text x="0" y="20" font-family="Inter" font-size="12.5" fill="#10B981">✔ Reduced risk &amp; automated checks</text>
    <text x="0" y="55" font-family="Inter" font-size="12.5" fill="#10B981">✔ Native serverless services</text>
    <text x="0" y="90" font-family="Inter" font-size="12.5" fill="#10B981">✔ Cost efficient pay-as-you-go</text>
    <text x="0" y="125" font-family="Inter" font-size="12.5" fill="#10B981">✔ Elastic auto-scaling resources</text>
  </g>

  <rect x="50" y="370" width="700" height="55" rx="8" fill="rgba(30,41,59,0.3)" stroke="#1E293B" stroke-width="1" />
  <text x="70" y="402" font-family="Inter, sans-serif" font-size="12" fill="#94A3B8">A 2x2 grid matrix mapping Predicted (Columns: Fish, Not Fish) vs. Actual (Rows: Fish, Not Fish), showing the l...</text>
</svg>