<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Classification Performance: The Confusion Matrix</text>
  <text x="760" y="40" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">v0.3 beta | Mikeb</text>
<text x="380" y="90" font-family="Inter" font-size="14" font-weight="700" fill="#F8FAFC" text-anchor="middle">ACTUAL CLASS (GROUND TRUTH)</text><text x="90" y="270" font-family="Inter" font-size="14" font-weight="700" fill="#F8FAFC" text-anchor="middle" transform="rotate(-90 90 270)">PREDICTED CLASS</text><text x="290" y="125" font-family="Inter" font-size="13" font-weight="600" fill="#10B981" text-anchor="middle">Actual: YES</text><text x="510" y="125" font-family="Inter" font-size="13" font-weight="600" fill="#EF4444" text-anchor="middle">Actual: NO</text><text x="160" y="200" font-family="Inter" font-size="13" font-weight="600" fill="#10B981" text-anchor="end">Predicted: YES</text><text x="160" y="310" font-family="Inter" font-size="13" font-weight="600" fill="#EF4444" text-anchor="end">Predicted: NO</text><rect x="180" y="150" width="220" height="95" rx="4" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1.5" />
  <text x="200" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">True Positive (TP)</text>
  <text x="200" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Model said YES, Actual was YES</text><text x="290" y="225" font-family="Inter" font-size="11" font-weight="700" fill="#10B981" text-anchor="middle">Correct Prediction</text><rect x="400" y="150" width="220" height="95" rx="4" fill="rgba(239,68,68,0.15)" stroke="#EF4444" stroke-width="1.5" />
  <text x="420" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">False Positive (FP)</text>
  <text x="420" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Model said YES, Actual was NO</text><text x="510" y="225" font-family="Inter" font-size="11" font-weight="700" fill="#EF4444" text-anchor="middle">Type I Error (False Alarm)</text><rect x="180" y="250" width="220" height="95" rx="4" fill="rgba(239,68,68,0.15)" stroke="#EF4444" stroke-width="1.5" />
  <text x="200" y="280" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">False Negative (FN)</text>
  <text x="200" y="300" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Model said NO, Actual was YES</text><text x="290" y="325" font-family="Inter" font-size="11" font-weight="700" fill="#EF4444" text-anchor="middle">Type II Error (Missed)</text><rect x="400" y="250" width="220" height="95" rx="4" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1.5" />
  <text x="420" y="280" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">True Negative (TN)</text>
  <text x="420" y="300" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Model said NO, Actual was NO</text><text x="510" y="325" font-family="Inter" font-size="11" font-weight="700" fill="#10B981" text-anchor="middle">Correct Prediction</text>
</svg>