<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">4-Step Circular Governance Strategy</text>
  <text x="760" y="40" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">v0.3 beta | Mikeb</text>
<rect x="120" y="100" width="190" height="80" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="140" y="130" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">1. Map Scope</text>
  <text x="140" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Determine Scope 1-5 matrix</text><line x1="310" y1="140" x2="490" y2="140" stroke="#00A3E0" stroke-width="2" stroke-linecap="round" />
  <line x1="490" y1="140" x2="483.0717967697245" y2="144.0" stroke="#00A3E0" stroke-width="2" stroke-linecap="round" />
  <line x1="490" y1="140" x2="483.0717967697245" y2="136.0" stroke="#00A3E0" stroke-width="2" stroke-linecap="round" /><rect x="490" y="100" width="190" height="80" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="510" y="130" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">2. Document Rules</text>
  <text x="510" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Establish policy baselines</text><line x1="585" y1="180" x2="585" y2="260" stroke="#FF9900" stroke-width="2" stroke-linecap="round" />
  <line x1="585" y1="260" x2="581.0" y2="253.0717967697245" stroke="#FF9900" stroke-width="2" stroke-linecap="round" />
  <line x1="585" y1="260" x2="589.0" y2="253.0717967697245" stroke="#FF9900" stroke-width="2" stroke-linecap="round" /><rect x="490" y="260" width="190" height="80" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="510" y="290" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">3. Automate Monitoring</text>
  <text x="510" y="310" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">SageMaker Model Monitor alerts</text><line x1="490" y1="300" x2="310" y2="300" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <line x1="310" y1="300" x2="316.9282032302755" y2="296.0" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <line x1="310" y1="300" x2="316.9282032302755" y2="304.0" stroke="#10B981" stroke-width="2" stroke-linecap="round" /><rect x="120" y="260" width="190" height="80" rx="12" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="140" y="290" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">4. Human Review Audits</text>
  <text x="140" y="310" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">A2I loops and audit reports</text><line x1="215" y1="260" x2="215" y2="180" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" />
  <line x1="215" y1="180" x2="219.0" y2="186.9282032302755" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" />
  <line x1="215" y1="180" x2="211.0" y2="186.9282032302755" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" />
</svg>