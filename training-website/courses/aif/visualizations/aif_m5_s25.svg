<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">AWS Audit Manager Continuous Evidence Collection</text>
<rect x="40" y="160" width="140" height="110" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8FAFC" textLength="118" lengthAdjust="spacingAndGlyphs">SageMaker / Bedrock</text>
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Active AI environments</text>
    <g transform="translate(95, 220)">
      <rect x="0" y="0" width="30" height="8" rx="1.5" fill="none" stroke="#00A3E0" stroke-width="1.5" />
      <circle cx="5" cy="4" r="1.5" fill="#00A3E0" />
      <rect x="0" y="11" width="30" height="8" rx="1.5" fill="none" stroke="#00A3E0" stroke-width="1.5" />
      <circle cx="5" cy="15" r="1.5" fill="#00A3E0" />
    </g>
    <line x1="180" y1="210" x2="250" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="250" y1="210" x2="243.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="250" y1="210" x2="243.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="215.0" y="202.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">1. Scan env</text><rect x="250" y="100" width="240" height="220" rx="12" fill="url(#dark-card)" stroke="url(#aws-orange)" stroke-width="1.5" />
  <text x="270" y="130" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">AWS Audit Manager</text>
  <text x="270" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Continuous evidence gathering</text><rect x="270" y="150" width="200" height="45" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="290" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Fetch CloudTrail Logs</text>
  <text x="290" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">API call logs collected</text><rect x="270" y="210" width="200" height="45" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="290" y="232.0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Fetch Resource Configs</text>
  <text x="290" y="250.0" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Encryption settings checked</text><rect x="270" y="270" width="200" height="40" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="290" y="292.0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Assess against controls</text>
  <text x="290" y="310.0" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">ISO / SOC standards checks</text><line x1="490" y1="210" x2="560" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="560" y1="210" x2="553.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="560" y1="210" x2="553.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="525.0" y="202.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">2. Compile PDF</text><rect x="560" y="160" width="190" height="110" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="580" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Final Audit Report PDF</text>
  <text x="580" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Regulatory compliant record</text>
    <g transform="translate(640, 215)">
      <path d="M 0,0 L 15,-8 L 30,0 L 30,12 Q 30,24 15,28 Q 0,24 0,12 Z" fill="none" stroke="#10B981" stroke-width="1.5" />
      <path d="M 15,-4 L 25,2 L 25,12 Q 25,20 15,24 Q 5,20 5,12 L 5,2 L 15,-4" fill="#10B981" opacity="0.3" />
    </g>
    
</svg>