<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Generative AI Security Scoping Matrix</text>
<rect x="60" y="260" width="130" height="130" rx="4" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="80" y="286" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Scope 1<tspan x="80" dy="16" font-size="11" fill="#CBD5E1">(Consumer App)</tspan></text>
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Basic employee<tspan x="80" dy="14">use guidelines</tspan></text><circle cx="85" cy="355" r="12" fill="#10B981" /><text x="85" y="359" font-family="Inter" font-size="10.5" font-weight="700" fill="#000000" text-anchor="middle">1</text><rect x="195" y="215" width="130" height="130" rx="4" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="215" y="241" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Scope 2<tspan x="215" dy="16" font-size="11" fill="#CBD5E1">(Enterprise App)</tspan></text>
  <text x="215" y="275" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Third party<tspan x="215" dy="14">SaaS contracts</tspan></text><circle cx="220" cy="310" r="12" fill="#00A3E0" /><text x="220" y="314" font-family="Inter" font-size="10.5" font-weight="700" fill="#000000" text-anchor="middle">2</text><rect x="330" y="170" width="130" height="130" rx="4" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="350" y="196" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Scope 3<tspan x="350" dy="16" font-size="11" fill="#CBD5E1">(Pretrained APIs)</tspan></text>
  <text x="350" y="230" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Bedrock base<tspan x="350" dy="14">models access</tspan></text><circle cx="355" cy="265" r="12" fill="#FF9900" /><text x="355" y="269" font-family="Inter" font-size="10.5" font-weight="700" fill="#000000" text-anchor="middle">3</text><rect x="465" y="125" width="130" height="130" rx="4" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="485" y="151" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Scope 4<tspan x="485" dy="16" font-size="11" fill="#CBD5E1">(Fine-Tuned FMs)</tspan></text>
  <text x="485" y="185" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Custom training<tspan x="485" dy="14">data protection</tspan></text><circle cx="490" cy="220" r="12" fill="#EF4444" /><text x="490" y="224" font-family="Inter" font-size="10.5" font-weight="700" fill="#000000" text-anchor="middle">4</text><rect x="600" y="80" width="130" height="130" rx="4" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="620" y="106" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Scope 5<tspan x="620" dy="16" font-size="11" fill="#CBD5E1">(Self-Trained FMs)</tspan></text>
  <text x="620" y="140" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Full stack<tspan x="620" dy="14">model security</tspan></text><circle cx="625" cy="175" r="12" fill="#8B5CF6" /><text x="625" y="179" font-family="Inter" font-size="10.5" font-weight="700" fill="#000000" text-anchor="middle">5</text><line x1="60" y1="395" x2="740" y2="395" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <line x1="740" y1="395" x2="733.0717967697245" y2="399.0" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <line x1="740" y1="395" x2="733.0717967697245" y2="391.0" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <text x="400.0" y="387.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Increasing Customer Security &amp; Compliance Responsibility</text>
</svg>