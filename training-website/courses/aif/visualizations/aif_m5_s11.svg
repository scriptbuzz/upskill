<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">VPC Subnet Isolation for SageMaker</text>
<rect x="60" y="95" width="680" height="280" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="80" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Amazon Customer VPC</text>
  <text x="80" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Completely isolated subnet</text><rect x="100" y="160" width="240" height="170" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="120" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Private Subnet (No IGW route)</text>
  <text x="120" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Cannot route to internet</text><rect x="120" y="210" width="200" height="50" rx="12" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1.5" />
  <text x="140" y="240" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">SageMaker Notebooks</text>
  <text x="140" y="260" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Workloads compute instances</text><rect x="460" y="160" width="240" height="170" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="480" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Public Internet Gateway</text>
  <text x="480" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Blocked network entrance</text>
    <g transform="translate(565, 210)">
      <circle cx="15" cy="10" r="7" fill="none" stroke="#EF4444" stroke-width="1.5" />
      <path d="M 3,24 Q 15,14 27,24" fill="none" stroke="#EF4444" stroke-width="1.5" />
    </g>
    <line x1="340" y1="245" x2="460" y2="245" stroke="#EF4444" stroke-width="2" stroke-dasharray="5 5" stroke-linecap="round" />
  <line x1="460" y1="245" x2="453.0717967697245" y2="249.0" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <line x1="460" y1="245" x2="453.0717967697245" y2="241.0" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <text x="400.0" y="237.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Blocked Access</text>
</svg>