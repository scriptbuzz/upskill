<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Data Formats in Machine Learning</text>
<rect x="50" y="95" width="160" height="280" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="70" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Structured Data</text>
  <text x="70" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Highly organized, tables</text>
    <g transform="translate(65, 170)" font-family="monospace" font-size="8.5" fill="#94A3B8">
      <text x="0" y="0" fill="#10B981" font-weight="700">ID   Price  Qty</text>
      <text x="0" y="15">101  14.99  1</text>
      <text x="0" y="30">102  3.99   2</text>
      <text x="0" y="45">103  42.50  1</text>
    </g>
    <text x="130" y="340" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">Easy for traditional ML</text><rect x="225" y="95" width="160" height="280" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="245" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Semi-Structured</text>
  <text x="245" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Has internal markers</text>
    <g transform="translate(240, 170)" font-family="monospace" font-size="8.5" fill="#94A3B8">
      <text x="0" y="0" fill="#00A3E0" font-weight="700">{</text>
      <text x="10" y="15">"customer": {</text>
      <text x="20" y="30">"name": "Jane",</text>
      <text x="20" y="45">"age": 71</text>
      <text x="10" y="60">}</text>
      <text x="0" y="75">}</text>
    </g>
    <text x="305" y="340" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">XML / JSON Log files</text><rect x="400" y="95" width="160" height="280" rx="12" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="420" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Unstructured Data</text>
  <text x="420" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Requires deep learning</text><rect x="445" y="180" width="30" height="25" rx="2" fill="none" stroke="#8B5CF6" stroke-width="1.5" /><circle cx="455" cy="190" r="3" fill="#8B5CF6" /><path d="M 448,203 L 458,193 L 472,203" fill="none" stroke="#8B5CF6" stroke-width="1.5" /><line x1="495" y1="180" x2="495" y2="205" stroke="#00A3E0" stroke-width="2" /><line x1="500" y1="175" x2="500" y2="210" stroke="#00A3E0" stroke-width="2" /><line x1="505" y1="185" x2="505" y2="200" stroke="#00A3E0" stroke-width="2" /><line x1="510" y1="190" x2="510" y2="195" stroke="#00A3E0" stroke-width="2" /><text x="480" y="250" font-family="Inter" font-size="9" fill="#F8FAFC" text-anchor="middle">PDFs, Images, Audio</text><text x="480" y="340" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">Complex features</text><rect x="575" y="95" width="160" height="280" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="595" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Time-Series Data</text>
  <text x="595" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Uniform time intervals</text><path d="M 590,210 L 610,175 L 630,225 L 650,195 L 670,230 L 690,180 L 710,215 L 720,200" fill="none" stroke="#FF9900" stroke-width="2" /><text x="655" y="270" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">CPU %, Stock Tickers</text><text x="655" y="340" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">Chronological order</text>
</svg>