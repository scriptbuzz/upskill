<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Generative AI Business Dashboard</text>
<rect x="60" y="100" width="320" height="120" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="80" y="130" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Cost per API Call</text>
  <text x="80" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Lower is better</text><text x="220" y="182" font-family="Inter" font-size="32" font-weight="700" fill="#10B981" text-anchor="middle">$0.004</text><text x="220" y="209" font-family="Inter" font-size="11" fill="#94A3B8" text-anchor="middle">Reduced 40% via PEFT caching</text><rect x="400" y="100" width="320" height="120" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="420" y="130" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Student Satisfaction Rate</text>
  <text x="420" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Determined via helpfulness thumbs up</text><text x="560" y="182" font-family="Inter" font-size="32" font-weight="700" fill="#00A3E0" text-anchor="middle">94.8%</text><text x="560" y="209" font-family="Inter" font-size="11" fill="#94A3B8" text-anchor="middle">Target benchmark: > 90%</text><rect x="60" y="245" width="320" height="120" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="80" y="275" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Average Token Latency</text>
  <text x="80" y="295" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Time to complete response</text><text x="220" y="327" font-family="Inter" font-size="32" font-weight="700" fill="#FF9900" text-anchor="middle">0.82 sec</text><text x="220" y="354" font-family="Inter" font-size="11" fill="#94A3B8" text-anchor="middle">Latency constraint met</text><rect x="400" y="245" width="320" height="120" rx="12" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="420" y="275" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Daily Active Tokens Pool</text>
  <text x="420" y="295" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">SLA resource limits allocation</text><text x="560" y="327" font-family="Inter" font-size="32" font-weight="700" fill="#8B5CF6" text-anchor="middle">12.5M</text><text x="560" y="354" font-family="Inter" font-size="11" fill="#94A3B8" text-anchor="middle">Limit: 50.0M maximum capacity</text>
</svg>