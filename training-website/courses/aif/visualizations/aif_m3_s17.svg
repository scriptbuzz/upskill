<circle cx="165" cy="230" r="50" fill="none" stroke="#1E293B" stroke-width="10" /><circle cx="165" cy="230" r="50" fill="none" stroke="#10B981" stroke-width="10" stroke-dasharray="210 314" stroke-dashoffset="-45" /><line x1="165" y1="230" x2="195" y2="200" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round" /><circle cx="165" cy="230" r="6" fill="#F8FAFC" /><text x="165" y="305" font-family="Inter" font-size="12" font-weight="700" fill="#10B981" text-anchor="middle">92% ACCURACY</text>  <rect x="295" y="100" width="210" height="260" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
