  <text x="315" y="155" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">Recall by Category</text>
<rect x="330" y="260" width="22" height="60" rx="2" fill="#EF4444" /><rect x="380" y="180" width="22" height="140" rx="2" fill="#10B981" /><rect x="430" y="220" width="22" height="100" rx="2" fill="#00A3E0" /><line x1="315" y1="320" x2="475" y2="320" stroke="#475569" stroke-width="1.5" />  <rect x="530" y="100" width="210" height="260" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="550" y="135" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">Loss Over Time</text>
  <text x="550" y="155" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">Training Convergence</text>
<path d="M 560,170 Q 600,230 640,270 T 710,300" fill="none" stroke="#FF9900" stroke-width="3" /><circle cx="560" cy="170" r="4" fill="#FF9900" /><circle cx="710" cy="300" r="4" fill="#FF9900" />
  <rect x="60" y="380" width="680" height="45" rx="8" fill="rgba(30,41,59,0.3)" stroke="#1E293B" stroke-width="1" />
