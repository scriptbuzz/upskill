<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Amazon Bedrock Guardrails Filtering Gate</text>
<rect x="40" y="160" width="120" height="100" rx="12" fill="url(#dark-card)" stroke="#334155" stroke-width="1.5" />
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Input Prompt</text>
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Incoming query</text>
    <g transform="translate(85, 215)">
      <circle cx="15" cy="10" r="7" fill="none" stroke="#F8FAFC" stroke-width="1.5" />
      <path d="M 3,24 Q 15,14 27,24" fill="none" stroke="#F8FAFC" stroke-width="1.5" />
    </g>
    <line x1="160" y1="210" x2="210" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="210" y1="210" x2="203.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="210" y1="210" x2="203.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="210" y="130" width="130" height="160" rx="12" fill="rgba(239,68,68,0.05)" stroke="#EF4444" stroke-width="1.5" />
  <text x="230" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Content Filter</text>
  <text x="230" y="180" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Blocks hate, toxicity</text><line x1="340" y1="210" x2="380" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="380" y1="210" x2="373.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="380" y1="210" x2="373.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="380" y="130" width="130" height="160" rx="12" fill="rgba(245,158,11,0.05)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="400" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Topic Filter</text>
  <text x="400" y="180" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Denied business scopes</text><line x1="510" y1="210" x2="550" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="550" y1="210" x2="543.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="550" y1="210" x2="543.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="550" y="130" width="130" height="160" rx="12" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1.5" />
  <text x="570" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">PII Masking</text>
  <text x="570" y="180" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">SSN, phone redaction</text><line x1="680" y1="210" x2="720" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="720" y1="210" x2="713.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="720" y1="210" x2="713.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="720" y="160" width="60" height="100" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="740" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">LLM</text>
  <text x="740" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Clean Output</text>
</svg>