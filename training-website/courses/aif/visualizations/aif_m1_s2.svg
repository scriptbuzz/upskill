<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Traditional Software vs. AI Systems</text>
<rect x="60" y="90" width="310" height="290" rx="12" fill="url(#dark-card)" stroke="#475569" stroke-width="1.5" />
  <text x="80" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Traditional Software Development</text>
  <text x="80" y="140" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Logic is hardcoded by developers</text><rect x="90" y="160" width="250" height="50" rx="12" fill="rgba(71,85,105,0.2)" stroke="#475569" stroke-width="1.5" />
  <text x="110" y="182.0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Inputs (Data)</text>
  <text x="110" y="200.0" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">e.g., Numbers, raw parameters</text><rect x="90" y="230" width="250" height="50" rx="12" fill="rgba(71,85,105,0.2)" stroke="#475569" stroke-width="1.5" />
  <text x="110" y="252.0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Rigid Rules (Code Logic)</text>
  <text x="110" y="270.0" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">e.g., IF/ELSE statements, calculations</text><line x1="215" y1="290" x2="215" y2="320" stroke="#475569" stroke-width="2" stroke-linecap="round" />
  <line x1="215" y1="320" x2="211.0" y2="313.0717967697245" stroke="#475569" stroke-width="2" stroke-linecap="round" />
  <line x1="215" y1="320" x2="219.0" y2="313.0717967697245" stroke="#475569" stroke-width="2" stroke-linecap="round" />
  <text x="215.0" y="297.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Compile &amp; Execute</text><rect x="90" y="320" width="250" height="45" rx="12" fill="rgba(239,68,68,0.1)" stroke="#EF4444" stroke-width="1.5" />
  <text x="110" y="342.0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Static Output</text>
  <text x="110" y="360.0" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Predefined deterministic results</text><rect x="430" y="90" width="310" height="290" rx="12" fill="url(#dark-card)" stroke="url(#aws-orange)" stroke-width="1.5" />
  <text x="450" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">AI &amp; Machine Learning Systems</text>
  <text x="450" y="140" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Logic is learned from datasets</text><rect x="460" y="160" width="250" height="50" rx="12" fill="rgba(255,153,0,0.1)" stroke="url(#aws-orange)" stroke-width="1.5" />
  <text x="480" y="182.0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Historical Data (Inputs)</text>
  <text x="480" y="200.0" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">e.g., Transcripts, server records, usage patterns</text><rect x="460" y="230" width="250" height="50" rx="12" fill="rgba(255,153,0,0.1)" stroke="url(#aws-orange)" stroke-width="1.5" />
  <text x="480" y="252.0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Known Outcomes (Labels)</text>
  <text x="480" y="270.0" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">e.g., Fraud flags, actual customer ratings</text><line x1="585" y1="290" x2="585" y2="320" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="585" y1="320" x2="581.0" y2="313.0717967697245" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="585" y1="320" x2="589.0" y2="313.0717967697245" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="585.0" y="297.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Model Training</text><rect x="460" y="320" width="250" height="45" rx="12" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1.5" />
  <text x="480" y="342.0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Learned Model (Logic)</text>
  <text x="480" y="360.0" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Capable of generalizing to new inputs</text>
</svg>