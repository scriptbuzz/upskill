<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Algorithmic Foundation Model Evaluation Metrics</text>
<rect x="60" y="110" width="200" height="260" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="80" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">ROUGE Score</text>
  <text x="80" y="160" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Recall overlap metric</text><text x="160" y="210" font-family="Inter" font-size="11" fill="#EF4444" font-weight="700" text-anchor="middle">ROUGE-N, ROUGE-L</text>
    <g transform="translate(75, 230)" font-family="Inter" font-size="10" fill="#94A3B8">
      <text x="0" y="15">Calculates n-gram overlap</text>
      <text x="0" y="30">between model summary</text>
      <text x="0" y="45">and human reference.</text>
      <text x="0" y="70" fill="#F8FAFC">Best for: Summarization</text>
    </g>
    <rect x="290" y="110" width="200" height="260" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="310" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">BLEU Score</text>
  <text x="310" y="160" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Precision overlap metric</text><text x="390" y="210" font-family="Inter" font-size="11" fill="#00A3E0" font-weight="700" text-anchor="middle">Bilingual Evaluation Understudy</text>
    <g transform="translate(305, 230)" font-family="Inter" font-size="10" fill="#94A3B8">
      <text x="0" y="15">Measures precision of words</text>
      <text x="0" y="30">generated in comparison</text>
      <text x="0" y="45">to multiple references.</text>
      <text x="0" y="70" fill="#F8FAFC">Best for: Translation</text>
    </g>
    <rect x="520" y="110" width="220" height="260" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="540" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">BERTScore</text>
  <text x="540" y="160" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Semantic similarity metric</text><text x="630" y="210" font-family="Inter" font-size="11" fill="#10B981" font-weight="700" text-anchor="middle">Contextual Embeddings</text>
    <g transform="translate(535, 230)" font-family="Inter" font-size="10" fill="#94A3B8">
      <text x="0" y="15">Uses dense vectors to check</text>
      <text x="0" y="30">similarity, catching synonyms</text>
      <text x="0" y="45">even if words don't match.</text>
      <text x="0" y="70" fill="#F8FAFC">Best for: Semantic accuracy</text>
    </g>
    
</svg>