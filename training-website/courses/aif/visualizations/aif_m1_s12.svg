<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">The Machine Learning Lifecycle</text>
<rect x="40" y="160" width="125" height="95" rx="12" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">1. Define Problem</text>
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Establish metrics</text><rect x="190" y="160" width="125" height="95" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="210" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">2. Prep Data</text>
  <text x="210" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Clean &amp; label</text><rect x="340" y="160" width="125" height="95" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="360" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">3. Build &amp; Train</text>
  <text x="360" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Tuning weights</text><rect x="490" y="160" width="125" height="95" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="510" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">4. Deploy Model</text>
  <text x="510" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Real-time API</text><rect x="640" y="160" width="120" height="95" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="660" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">5. Monitor Quality</text>
  <text x="660" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Detect drift</text><line x1="165" y1="210" x2="190" y2="210" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" />
  <line x1="190" y1="210" x2="183.0717967697245" y2="214.0" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" />
  <line x1="190" y1="210" x2="183.0717967697245" y2="206.0" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" /><line x1="315" y1="210" x2="340" y2="210" stroke="#00A3E0" stroke-width="2" stroke-linecap="round" />
  <line x1="340" y1="210" x2="333.0717967697245" y2="214.0" stroke="#00A3E0" stroke-width="2" stroke-linecap="round" />
  <line x1="340" y1="210" x2="333.0717967697245" y2="206.0" stroke="#00A3E0" stroke-width="2" stroke-linecap="round" /><line x1="465" y1="210" x2="490" y2="210" stroke="#FF9900" stroke-width="2" stroke-linecap="round" />
  <line x1="490" y1="210" x2="483.0717967697245" y2="214.0" stroke="#FF9900" stroke-width="2" stroke-linecap="round" />
  <line x1="490" y1="210" x2="483.0717967697245" y2="206.0" stroke="#FF9900" stroke-width="2" stroke-linecap="round" /><line x1="615" y1="210" x2="640" y2="210" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <line x1="640" y1="210" x2="633.0717967697245" y2="214.0" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <line x1="640" y1="210" x2="633.0717967697245" y2="206.0" stroke="#10B981" stroke-width="2" stroke-linecap="round" /><path d="M 700,160 Q 440,70 252,160" fill="none" stroke="#EF4444" stroke-dasharray="4 4" stroke-width="1.8" /><line x1="255" y1="158" x2="252" y2="160" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <line x1="252" y1="160" x2="255.5458127520822" y2="152.82872313132654" stroke="#EF4444" stroke-width="2" stroke-linecap="round" />
  <line x1="252" y1="160" x2="259.983414321884" y2="159.4851254860293" stroke="#EF4444" stroke-width="2" stroke-linecap="round" /><text x="470" y="85" font-family="Inter" font-size="10.5" fill="#EF4444" text-anchor="middle">Continuous Feedback &amp; Re-training</text>
</svg>