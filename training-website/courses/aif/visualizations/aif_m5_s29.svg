<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">AWS Glue DataBrew Data Preparation Factory</text>
<rect x="60" y="160" width="140" height="100" rx="12" fill="url(#dark-card)" stroke="#475569" stroke-width="1.5" />
  <text x="80" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Raw Data (S3)</text>
  <text x="80" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Null cells, raw formats</text><line x1="200" y1="210" x2="280" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="280" y1="210" x2="273.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="280" y1="210" x2="273.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="280" y="110" width="250" height="200" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="300" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">AWS Glue DataBrew</text>
  <text x="300" y="160" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Visual data prep &amp; cleaning</text><rect x="300" y="165" width="210" height="45" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="320" y="195" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Data Profiling</text>
  <text x="320" y="215" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Checks statistics &amp; distributions</text><rect x="300" y="225" width="210" height="45" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="320" y="255" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Quality Scans</text>
  <text x="320" y="275" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Flag missing values &amp; anomalies</text><line x1="530" y1="210" x2="610" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="610" y1="210" x2="603.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="610" y1="210" x2="603.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="570.0" y="202.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Catalog Schema</text><rect x="610" y="160" width="130" height="100" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="630" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Glue Data Catalog</text>
  <text x="630" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Unified metadata index</text>
    <g transform="translate(660, 215)">
      <path d="M 0,5 Q 15,0 30,5 L 30,25 Q 15,30 0,25 Z" fill="none" stroke="#10B981" stroke-width="1.5" />
      <path d="M 0,12 Q 15,17 30,12" fill="none" stroke="#10B981" stroke-width="1.5" />
      <path d="M 0,19 Q 15,24 30,19" fill="none" stroke="#10B981" stroke-width="1.5" />
    </g>
    
</svg>