<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Inference Parameters: Temperature, Top-P, &amp; Top-K</text>
<rect x="60" y="95" width="680" height="80" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="80" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Temperature (Randomness / Creativity)</text>
  <text x="80" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Low Temp = Deterministic, High Temp = Creative</text><line x1="100" y1="150" x2="680" y2="150" stroke="#334155" stroke-width="6" stroke-linecap="round" /><circle cx="280" cy="150" r="10" fill="#00A3E0" filter="url(#glow-blue)" /><text x="100" y="168" font-family="Inter" font-size="9" fill="#94A3B8">0.0 (Deterministic)</text><text x="280" y="169" font-family="Inter" font-size="10" font-weight="700" fill="#00A3E0" text-anchor="middle">Active: 0.3</text><text x="680" y="168" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="end">1.0 (Creative)</text><rect x="60" y="190" width="680" height="80" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="80" y="220" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Top-P (Cumulative Probability Threshold)</text>
  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Filters out tail tokens based on sum of likelihoods</text><line x1="100" y1="245" x2="680" y2="245" stroke="#334155" stroke-width="6" stroke-linecap="round" /><circle cx="580" cy="245" r="10" fill="#FF9900" filter="url(#glow-orange)" /><text x="100" y="263" font-family="Inter" font-size="9" fill="#94A3B8">0.0 (Top token only)</text><text x="580" y="264" font-family="Inter" font-size="10" font-weight="700" fill="#FF9900" text-anchor="middle">Active: 0.85</text><text x="680" y="263" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="end">1.0 (All tokens)</text><rect x="60" y="285" width="680" height="80" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="80" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Top-K (Exact Token Count Limit)</text>
  <text x="80" y="335" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Restricts sample pool to K most likely words</text><line x1="100" y1="340" x2="680" y2="340" stroke="#334155" stroke-width="6" stroke-linecap="round" /><circle cx="340" cy="340" r="10" fill="#10B981" /><text x="100" y="358" font-family="Inter" font-size="9" fill="#94A3B8">K=1</text><text x="340" y="359" font-family="Inter" font-size="10" font-weight="700" fill="#10B981" text-anchor="middle">Active: K=50</text><text x="680" y="358" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="end">K=500</text>
</svg>