<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Diffusion Models Process Flow</text>
  <text x="760" y="40" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">v0.3 beta | Mikeb</text>
<rect x="40" y="160" width="130" height="100" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">1. Clear Input</text>
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Original training image</text><line x1="170" y1="210" x2="220" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="220" y1="210" x2="213.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="220" y1="210" x2="213.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="195.0" y="202.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">+ Noise</text><rect x="220" y="160" width="130" height="100" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="240" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">2. Add Noise</text>
  <text x="240" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Gaussian scheduler</text><line x1="350" y1="210" x2="400" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="400" y1="210" x2="393.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="400" y1="210" x2="393.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="375.0" y="202.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Scramble</text><rect x="400" y="160" width="130" height="100" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="420" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">3. Pure Noise</text>
  <text x="420" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Raw chaotic pixels</text><line x1="530" y1="210" x2="580" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="580" y1="210" x2="573.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="580" y1="210" x2="573.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="555.0" y="202.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Denoise</text><rect x="580" y="160" width="160" height="100" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="600" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">4. Reconstructed</text>
  <text x="600" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">New generated sample</text><text x="285" y="115" font-family="Inter" font-size="11" fill="#FF9900" text-anchor="middle">Forward Pass (Destruction of data)</text><path d="M 60,140 L 510,140" fill="none" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="3 3" /><text x="515" y="305" font-family="Inter" font-size="11" fill="#00A3E0" text-anchor="middle">Reverse Pass (Generation via U-Net)</text><path d="M 420,290 L 730,290" fill="none" stroke="#00A3E0" stroke-width="1.5" stroke-dasharray="3 3" />
</svg>