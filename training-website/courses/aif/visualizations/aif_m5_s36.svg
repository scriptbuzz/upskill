<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Protecting the AWS Root User</text>
  <rect x="60" y="110" width="220" height="220" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="80" y="140" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">Root User</text>
  <text x="80" y="159" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Unrestricted access to<tspan x="80" dy="14">every account resource</tspan></text>
  <g stroke="url(#alert-red)" stroke-width="2" fill="none">
    <circle cx="170" cy="230" r="14"/>
    <path d="M 152 268 C 152 250, 188 250, 188 268" />
    <path d="M 158 210 L 165 200 L 175 200 L 182 210" stroke-linejoin="round"/>
    <circle cx="163" cy="204" r="1.5" fill="#EF4444"/><circle cx="170" cy="202" r="1.5" fill="#EF4444"/><circle cx="177" cy="204" r="1.5" fill="#EF4444"/>
  </g>
  <text x="170" y="305" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#EF4444" text-anchor="middle" font-weight="600">Use rarely. Guard heavily.</text>
  <line x1="280" y1="220" x2="340" y2="220" stroke="#FF9900" stroke-width="2" stroke-linecap="round"/>
  <path d="M 340 220 L 333 216 L 333 224 Z" fill="#FF9900"/>
  <rect x="340" y="95" width="400" height="290" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="360" y="125" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">Account Security Best Practices</text>
  <rect x="360" y="145" width="360" height="46" rx="8" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1"/>
  <g stroke="#10B981" stroke-width="2" fill="none">
    <circle cx="382" cy="168" r="9"/>
    <path d="M 378 168 L 381 172 L 387 164" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="400" y="165" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8FAFC">Enable MFA on the root user</text>
  <text x="400" y="181" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8">Hardware or virtual authenticator</text>
  <rect x="360" y="201" width="360" height="46" rx="8" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1"/>
  <g stroke="#10B981" stroke-width="2" fill="none">
    <circle cx="382" cy="224" r="9"/>
    <path d="M 378 224 L 381 228 L 387 220" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="400" y="221" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8FAFC">Delete root access keys</text>
  <text x="400" y="237" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8">No programmatic root access</text>
  <rect x="360" y="257" width="360" height="46" rx="8" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1"/>
  <g stroke="#10B981" stroke-width="2" fill="none">
    <circle cx="382" cy="280" r="9"/>
    <path d="M 378 280 L 381 284 L 387 276" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="400" y="277" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8FAFC">Create IAM identities for daily work</text>
  <text x="400" y="293" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8">Admins, developers, ML workloads</text>
  <rect x="360" y="313" width="360" height="46" rx="8" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1"/>
  <g stroke="#10B981" stroke-width="2" fill="none">
    <circle cx="382" cy="336" r="9"/>
    <path d="M 378 336 L 381 340 L 387 332" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="400" y="333" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8FAFC">Reserve root for rare account tasks</text>
  <text x="400" y="349" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8">Account closure, billing settings</text>
</svg>
