<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">SageMaker ML Lineage Tracking</text>
  <text x="760" y="40" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">v0.3 beta | Mikeb</text>
<rect x="40" y="180" width="100" height="80" rx="12" fill="url(#dark-card)" stroke="#475569" stroke-width="1.5" />
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">S3 Input</text>
  <text x="60" y="230" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Raw dataset file</text><line x1="140" y1="220" x2="190" y2="220" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="190" y1="220" x2="183.0717967697245" y2="224.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="190" y1="220" x2="183.0717967697245" y2="216.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="190" y="180" width="110" height="80" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="210" y="210" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Training Job</text>
  <text x="210" y="230" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Model learning run</text><line x1="300" y1="220" x2="350" y2="220" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="350" y1="220" x2="343.0717967697245" y2="224.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="350" y1="220" x2="343.0717967697245" y2="216.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="350" y="180" width="110" height="80" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="370" y="210" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Model Artifacts</text>
  <text x="370" y="230" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Weights tarball</text><line x1="460" y1="220" x2="510" y2="220" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="510" y1="220" x2="503.0717967697245" y2="224.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="510" y1="220" x2="503.0717967697245" y2="216.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="510" y="180" width="110" height="80" rx="12" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="530" y="210" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Model Registry</text>
  <text x="530" y="230" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Audited package</text><line x1="620" y1="220" x2="670" y2="220" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="670" y1="220" x2="663.0717967697245" y2="224.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="670" y1="220" x2="663.0717967697245" y2="216.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="670" y="180" width="90" height="80" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="690" y="210" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">API Endpoint</text>
  <text x="690" y="230" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Active live model</text>
    <g transform="translate(40, 290)">
      <rect x="0" y="0" width="720" height="45" rx="8" fill="rgba(30,41,59,0.3)" stroke="#1E293B" stroke-width="1" />
      <text x="20" y="26" font-family="Inter" font-size="11" fill="#94A3B8">Lineage records all parent resources, ensuring model audits can trace outputs back to original dataset files.</text>
    </g>
    
</svg>