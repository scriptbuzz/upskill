<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">ML Frameworks &amp; Transfer Learning</text>
  <rect x="60" y="95" width="260" height="290" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="80" y="125" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">ML Frameworks</text>
  <text x="80" y="144" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Open-source model building blocks</text>
  <rect x="80" y="160" width="220" height="38" rx="8" fill="rgba(148,163,184,0.06)" stroke="#FF9900" stroke-width="1.5"/>
  <text x="100" y="184" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8FAFC">TensorFlow</text>
  <rect x="80" y="210" width="220" height="38" rx="8" fill="rgba(148,163,184,0.06)" stroke="#EF4444" stroke-width="1.5"/>
  <text x="100" y="234" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8FAFC">PyTorch</text>
  <rect x="80" y="260" width="220" height="38" rx="8" fill="rgba(148,163,184,0.06)" stroke="#00A3E0" stroke-width="1.5"/>
  <text x="100" y="284" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8FAFC">scikit-learn</text>
  <rect x="80" y="310" width="220" height="38" rx="8" fill="rgba(148,163,184,0.06)" stroke="#10B981" stroke-width="1.5"/>
  <text x="100" y="334" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8FAFC">Hugging Face</text>
  <text x="190" y="375" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Run on SageMaker managed containers</text>
  <rect x="390" y="130" width="160" height="120" rx="12" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="410" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Pretrained Model</text>
  <text x="410" y="178" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Learned from massive<tspan x="410" dy="14">general dataset</tspan></text>
  <g stroke="#8B5CF6" stroke-width="2" fill="none">
    <circle cx="450" cy="222" r="5"/><circle cx="470" cy="212" r="5"/><circle cx="470" cy="232" r="5"/><circle cx="490" cy="222" r="5"/>
    <line x1="455" y1="220" x2="465" y2="214"/><line x1="455" y1="224" x2="465" y2="230"/>
    <line x1="475" y1="214" x2="485" y2="220"/><line x1="475" y1="230" x2="485" y2="224"/>
  </g>
  <line x1="550" y1="190" x2="620" y2="190" stroke="#FF9900" stroke-width="2" stroke-linecap="round"/>
  <path d="M 620 190 L 613 186 L 613 194 Z" fill="#FF9900"/>
  <text x="585" y="178" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#FF9900" text-anchor="middle">Adapt</text>
  <rect x="620" y="130" width="140" height="120" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="640" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Fine-Tuned</text>
  <text x="640" y="178" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Adapted with your<tspan x="640" dy="14">small dataset</tspan></text>
  <g stroke="#10B981" stroke-width="2" fill="none">
    <path d="M 675 210 L 690 232 L 682 232 L 695 250" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <rect x="390" y="290" width="370" height="60" rx="10" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5"/>
  <text x="410" y="315" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#FF9900">Amazon SageMaker JumpStart</text>
  <text x="410" y="334" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#CBD5E1">Deploy or fine-tune pretrained open-source models in a few clicks</text>
</svg>
