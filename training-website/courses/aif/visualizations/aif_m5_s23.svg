<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">AI Risk Assessment Matrix (Likelihood vs. Severity)</text>
<text x="380" y="90" font-family="Inter" font-size="14" font-weight="700" fill="#F8FAFC" text-anchor="middle">IMPACT SEVERITY (Low → Extreme)</text><text x="48" y="250" font-family="Inter" font-size="14" font-weight="700" fill="#94A3B8" text-anchor="middle" transform="rotate(-90 48 250)">LIKELIHOOD (Rare → Frequent)</text><text x="210" y="125" font-family="Inter" font-size="12" fill="#94A3B8" text-anchor="middle">Low Severity</text><text x="390" y="125" font-family="Inter" font-size="12" fill="#94A3B8" text-anchor="middle">Medium Severity</text><text x="570" y="125" font-family="Inter" font-size="12" fill="#94A3B8" text-anchor="middle">High Severity</text><text x="110" y="175" font-family="Inter" font-size="12" fill="#94A3B8" text-anchor="end">Frequent</text><text x="110" y="245" font-family="Inter" font-size="12" fill="#94A3B8" text-anchor="end">Possible</text><text x="110" y="315" font-family="Inter" font-size="12" fill="#94A3B8" text-anchor="end">Rare</text><rect x="130" y="145" width="160" height="60" rx="4" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="150" y="175" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Low Risk</text><rect x="310" y="145" width="160" height="60" rx="4" fill="rgba(239,68,68,0.2)" stroke="#EF4444" stroke-width="1.5" />
  <text x="330" y="175" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">High Risk</text><rect x="490" y="145" width="160" height="60" rx="4" fill="rgba(239,68,68,0.4)" stroke="#EF4444" stroke-width="1.5" />
  <text x="510" y="175" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">CRITICAL RISK</text><rect x="130" y="215" width="160" height="60" rx="4" fill="rgba(16,185,129,0.2)" stroke="#10B981" stroke-width="1.5" />
  <text x="150" y="245" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Low Risk</text><rect x="310" y="215" width="160" height="60" rx="4" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="330" y="245" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Medium Risk</text><rect x="490" y="215" width="160" height="60" rx="4" fill="rgba(239,68,68,0.2)" stroke="#EF4444" stroke-width="1.5" />
  <text x="510" y="245" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">High Risk</text><rect x="130" y="285" width="160" height="60" rx="4" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1.5" />
  <text x="150" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Very Low Risk</text><rect x="310" y="285" width="160" height="60" rx="4" fill="rgba(16,185,129,0.2)" stroke="#10B981" stroke-width="1.5" />
  <text x="330" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Low Risk</text><rect x="490" y="285" width="160" height="60" rx="4" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="510" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Medium Risk</text>
</svg>