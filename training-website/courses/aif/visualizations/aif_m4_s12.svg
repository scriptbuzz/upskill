<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Model Evaluation Jobs on AWS</text>
<rect x="50" y="95" width="330" height="280" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="70" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Model A Output (Anthropic Claude)</text>
  <text x="70" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Evaluation target response</text><text x="70" y="160" font-family="Inter" font-size="11" fill="#F8FAFC">"The legal framework requires..."</text><polygon points="90,220 95,230 105,230 97,236 100,246 90,240 80,246 83,236 75,230 85,230" fill="#FF9900" /><polygon points="112,220 117,230 127,230 119,236 122,246 112,240 102,246 105,236 97,230 107,230" fill="#FF9900" /><polygon points="134,220 139,230 149,230 141,236 144,246 134,240 124,246 127,236 119,230 129,230" fill="#FF9900" /><polygon points="156,220 161,230 171,230 163,236 166,246 156,240 146,246 149,236 141,230 151,230" fill="#FF9900" /><polygon points="178,220 183,230 193,230 185,236 188,246 178,240 168,246 171,236 163,230 173,230" fill="#FF9900" /><text x="70" y="280" font-family="Inter" font-size="10.5" fill="#10B981">Toxicity Rating: None</text><rect x="420" y="95" width="330" height="280" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="440" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Model B Output (Amazon Titan)</text>
  <text x="440" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Evaluation target response</text><text x="440" y="160" font-family="Inter" font-size="11" fill="#F8FAFC">"The framework says..."</text><polygon points="460,220 465,230 475,230 467,236 470,246 460,240 450,246 453,236 445,230 455,230" fill="#FF9900" /><polygon points="482,220 487,230 497,230 489,236 492,246 482,240 472,246 475,236 467,230 477,230" fill="#FF9900" /><polygon points="504,220 509,230 519,230 511,236 514,246 504,240 494,246 497,236 489,230 499,230" fill="#FF9900" /><polygon points="526,220 531,230 541,230 533,236 536,246 526,240 516,246 519,236 511,230 521,230" fill="#475569" /><polygon points="548,220 553,230 563,230 555,236 558,246 548,240 538,246 541,236 533,230 543,230" fill="#475569" /><text x="440" y="280" font-family="Inter" font-size="10.5" fill="#EF4444">Toxicity Rating: Low</text><text x="400" y="410" font-family="Inter" font-size="12" fill="#94A3B8" text-anchor="middle">Reviewers assign ratings to compare model outputs side-by-side</text>
</svg>