<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">AWS Pre-built Vision &amp; Document AI Services</text>
  <text x="760" y="40" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">v0.3 beta | Mikeb</text>
<rect x="60" y="95" width="320" height="280" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="80" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Amazon Rekognition</text>
  <text x="80" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Custom labels, image/video analysis</text><rect x="90" y="180" width="260" height="90" rx="6" fill="rgba(0,163,224,0.05)" stroke="#00A3E0" stroke-width="1.2" /><circle cx="150" cy="225" r="22" fill="none" stroke="#F8FAFC" stroke-width="1.5" /><rect x="185" y="195" width="145" height="15" rx="3" fill="#1E293B" stroke="#334155" /><text x="195" y="206" font-family="Inter" font-size="9" fill="#10B981">Detected: Human Face (99%)</text><rect x="185" y="220" width="145" height="15" rx="3" fill="#1E293B" stroke="#334155" /><text x="195" y="231" font-family="Inter" font-size="9" fill="#00A3E0">Emotion: Happy (95%)</text><text x="220" y="340" font-family="Inter" font-size="10.5" fill="#94A3B8" text-anchor="middle">Face Detection, Content Moderation</text><rect x="420" y="95" width="320" height="280" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="440" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Amazon Textract</text>
  <text x="440" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Extract tables, forms, and layout from scans</text><rect x="450" y="180" width="260" height="90" rx="6" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.2" /><line x1="450" y1="210" x2="710" y2="210" stroke="#FF9900" stroke-width="1" /><line x1="450" y1="240" x2="710" y2="240" stroke="#FF9900" stroke-width="1" /><line x1="570" y1="180" x2="570" y2="270" stroke="#FF9900" stroke-width="1" /><text x="465" y="200" font-family="monospace" font-size="9.5" fill="#F8FAFC">Field Name</text><text x="585" y="200" font-family="monospace" font-size="9.5" fill="#10B981">Extracted Value</text><text x="465" y="228" font-family="monospace" font-size="8.5" fill="#94A3B8">Tax ID</text><text x="585" y="228" font-family="monospace" font-size="8.5" fill="#F8FAFC">XX-XXX4512</text><text x="580" y="340" font-family="Inter" font-size="10.5" fill="#94A3B8" text-anchor="middle">Form / Table Parsing, OCR Extraction</text>
</svg>