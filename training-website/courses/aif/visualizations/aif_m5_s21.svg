<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">AWS Compliance Tools: AWS Artifact</text>
  <text x="760" y="40" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">v0.3 beta | Mikeb</text>
<rect x="60" y="130" width="240" height="180" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="80" y="160" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">AWS Artifact Briefcase</text>
  <text x="80" y="180" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Self-service compliance reports portal</text>
    <g transform="translate(165, 215)">
      <path d="M 0,0 L 15,-8 L 30,0 L 30,12 Q 30,24 15,28 Q 0,24 0,12 Z" fill="none" stroke="#10B981" stroke-width="1.5" />
      <path d="M 15,-4 L 25,2 L 25,12 Q 25,20 15,24 Q 5,20 5,12 L 5,2 L 15,-4" fill="#10B981" opacity="0.3" />
    </g>
    <line x1="300" y1="220" x2="410" y2="220" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="410" y1="220" x2="403.0717967697245" y2="224.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="410" y1="220" x2="403.0717967697245" y2="216.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="355.0" y="212.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Downloads PDF docs</text><rect x="410" y="110" width="320" height="220" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="430" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Certified Security Audit Documents</text>
  <text x="430" y="160" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Shared directly with corporate auditors</text><rect x="430" y="160" width="280" height="40" rx="12" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1.5" />
  <text x="450" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">SOC 2 Type II Report</text>
  <text x="450" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">System and Organization controls audit</text><rect x="430" y="215" width="280" height="40" rx="12" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1.5" />
  <text x="450" y="245" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">ISO 27001 Certification</text>
  <text x="450" y="265" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Global information security management</text><rect x="430" y="270" width="280" height="40" rx="12" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1.5" />
  <text x="450" y="300" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">HIPAA Business Associate Addendum (BAA)</text>
  <text x="450" y="320" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Protected health information controls</text>
</svg>