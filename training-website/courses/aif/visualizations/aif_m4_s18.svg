<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Human-Centered AI Design Cycle</text>
<circle cx="400" cy="235" r="50" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="3" filter="url(#glow-blue)" /><text x="400" y="238" font-family="Inter" font-size="13" font-weight="700" fill="#F8FAFC" text-anchor="middle">HUMAN</text><rect x="200" y="95" width="150" height="75" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="220" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Fairness</text>
  <text x="220" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">De-biased results</text><rect x="450" y="95" width="150" height="75" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="470" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Explainability</text>
  <text x="470" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Clear logic</text><rect x="200" y="300" width="150" height="75" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="220" y="330" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">User Value</text>
  <text x="220" y="350" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Real utility</text><rect x="450" y="300" width="150" height="75" rx="12" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="470" y="330" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC" textLength="125" lengthAdjust="spacingAndGlyphs">Augmented Capability</text>
  <text x="470" y="350" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Enhance skills</text><line x1="280" y1="175" x2="360" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="360" y1="210" x2="352.0494004568112" y2="210.88767499899816" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="360" y1="210" x2="355.2559511289689" y2="203.55841631978063" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><line x1="520" y1="175" x2="440" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="440" y1="210" x2="444.7440488710311" y2="203.55841631978063" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="440" y1="210" x2="447.9505995431888" y2="210.88767499899816" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><line x1="280" y1="295" x2="360" y2="260" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="360" y1="260" x2="355.2559511289689" y2="266.44158368021937" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="360" y1="260" x2="352.0494004568112" y2="259.11232500100186" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><line x1="520" y1="295" x2="440" y2="260" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="440" y1="260" x2="447.9505995431888" y2="259.11232500100186" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="440" y1="260" x2="444.7440488710311" y2="266.44158368021937" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
</svg>