<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80.0" cy="90.0" r="240.0" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720.0" cy="360.0" r="240.0" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Shared Responsibility for AI</text>

  <!-- Donut Chart -->
  <g transform="translate(320, 230)">
    <!-- Segment 1: 35% -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#aws-orange)" stroke-width="32" stroke-dasharray="219.8 628" stroke-dashoffset="0" />
    <!-- Segment 2: 25% -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#cloud-blue)" stroke-width="32" stroke-dasharray="157 628" stroke-dashoffset="-219.8" />
    <!-- Segment 3: 20% -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#success-green)" stroke-width="32" stroke-dasharray="125.6 628" stroke-dashoffset="-376.8" />
    <!-- Segment 4: 20% -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#purple-glow)" stroke-width="32" stroke-dasharray="125.6 628" stroke-dashoffset="-502.4" />
    <circle cx="0" cy="0" r="82" fill="#0F172A" />
    <text x="0" y="6" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC" text-anchor="middle">AIF-C01</text>
    <text x="0" y="24" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">DOMAINS</text>
  </g>
  
  <!-- Legend Panel -->
  <g transform="translate(520, 110)">
    <rect x="0" y="0" width="240" height="240" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
    <text x="20" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">Visual Breakdown</text>
    
    <circle cx="30" cy="70" r="6" fill="#FF9900" />
    <text x="45" y="74" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">Generative AI (24%)</text>
    
    <circle cx="30" cy="110" r="6" fill="#00A3E0" />
    <text x="45" y="114" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">Applications of FMs (28%)</text>
    
    <circle cx="30" cy="150" r="6" fill="#10B981" />
    <text x="45" y="154" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">AI/ML Fundamentals (20%)</text>
    
    <circle cx="30" cy="190" r="6" fill="#8B5CF6" />
    <text x="45" y="194" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">Security &amp; Compliance (28%)</text>
  </g>
  
  <!-- Description Subtext -->
  <rect x="40" y="380" width="720" height="50" rx="8" fill="rgba(30,41,59,0.3)" stroke="#1E293B" stroke-width="1" />
  <text x="60" y="410" font-family="Inter, sans-serif" font-size="11.5" fill="#94A3B8">A split diagram showing the classic Shared Responsibility barrier: top half is yellow ("Custome...</text>
</svg>