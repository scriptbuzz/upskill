  <text x="80" y="300" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Container Versioning</text>
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">ECR Tag: image:2.1-gpu</text><line x1="280" y1="135" x2="410" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
