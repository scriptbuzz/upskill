<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Amazon Bedrock Agents Architecture</text>
<rect x="40" y="165" width="140" height="90" rx="12" fill="url(#dark-card)" stroke="#334155" stroke-width="1.5" />
  <text x="60" y="195" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">User / App</text>
  <text x="60" y="215" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Asks Agent to run task</text>
    <g transform="translate(95, 210)">
      <circle cx="15" cy="10" r="7" fill="none" stroke="#F8FAFC" stroke-width="1.5" />
      <path d="M 3,24 Q 15,14 27,24" fill="none" stroke="#F8FAFC" stroke-width="1.5" />
    </g>
    <line x1="180" y1="210" x2="240" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="240" y1="210" x2="233.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="240" y1="210" x2="233.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="240" y="100" width="260" height="220" rx="12" fill="url(#dark-card)" stroke="url(#aws-orange)" stroke-width="1.5" />
  <text x="260" y="130" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Bedrock Agent Orchestrator</text>
  <text x="260" y="150" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Reasoning &amp; Plan execution (ReAct)</text><rect x="260" y="150" width="220" height="50" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="280" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">1. Parse User Intent</text>
  <text x="280" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">LLM understands subtasks</text><rect x="260" y="210" width="220" height="50" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="280" y="232.0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">2. Execute Actions</text>
  <text x="280" y="250.0" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Calls APIs &amp; queries data</text><rect x="260" y="270" width="220" height="40" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="280" y="292.0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">3. Final Synthesis</text>
  <text x="280" y="310.0" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Formats output</text><line x1="500" y1="160" x2="580" y2="130" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="580" y1="130" x2="574.9174149337185" y2="136.17797127251433" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="580" y1="130" x2="572.1084274010113" y2="128.68733785196198" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="540.0" y="137.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Call API</text><line x1="500" y1="260" x2="580" y2="290" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="580" y1="290" x2="572.1084274010113" y2="291.31266214803804" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="580" y1="290" x2="574.9174149337185" y2="283.82202872748564" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="540.0" y="267.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Retrieve</text><rect x="580" y="80" width="160" height="90" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="600" y="110" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Action Group</text>
  <text x="600" y="130" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">AWS Lambda function</text><rect x="580" y="250" width="160" height="90" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="600" y="280" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Knowledge Base</text>
  <text x="600" y="300" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Vector index search</text>
    <g transform="translate(645, 305)">
      <path d="M 0,5 Q 15,0 30,5 L 30,25 Q 15,30 0,25 Z" fill="none" stroke="#00A3E0" stroke-width="1.5" />
      <path d="M 0,12 Q 15,17 30,12" fill="none" stroke="#00A3E0" stroke-width="1.5" />
      <path d="M 0,19 Q 15,24 30,19" fill="none" stroke="#00A3E0" stroke-width="1.5" />
    </g>
    
</svg>