<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Characteristics of Responsible Datasets</text>
<rect x="60" y="110" width="20" height="20" rx="4" fill="none" stroke="#10B981" stroke-width="2" /><path d="M 64,120 L 69,125 L 76,115" fill="none" stroke="#10B981" stroke-width="2.5" /><text x="95" y="125" font-family="Inter" font-size="13" font-weight="600" fill="#F8FAFC">Representative (Covers all demographic segments accurately)</text><rect x="60" y="170" width="20" height="20" rx="4" fill="none" stroke="#10B981" stroke-width="2" /><path d="M 64,180 L 69,185 L 76,175" fill="none" stroke="#10B981" stroke-width="2.5" /><text x="95" y="185" font-family="Inter" font-size="13" font-weight="600" fill="#F8FAFC">De-biased (Sourced without systemic historical tilts)</text><rect x="60" y="230" width="20" height="20" rx="4" fill="none" stroke="#10B981" stroke-width="2" /><path d="M 64,240 L 69,245 L 76,235" fill="none" stroke="#10B981" stroke-width="2.5" /><text x="95" y="245" font-family="Inter" font-size="13" font-weight="600" fill="#F8FAFC">Privacy-preserved (PII redacted via masking or synthetic rows)</text><rect x="60" y="290" width="20" height="20" rx="4" fill="none" stroke="#10B981" stroke-width="2" /><path d="M 64,300 L 69,305 L 76,295" fill="none" stroke="#10B981" stroke-width="2.5" /><text x="95" y="305" font-family="Inter" font-size="13" font-weight="600" fill="#F8FAFC">Fully Auditable (Clear records of data lineage and source files)</text>
</svg>