<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Model Customization &amp; Adaptation Spectrum</text>
<line x1="80" y1="280" x2="720" y2="280" stroke="#334155" stroke-width="8" stroke-linecap="round" /><line x1="80" y1="280" x2="380" y2="280" stroke="#00A3E0" stroke-width="8" stroke-linecap="round" /><line x1="380" y1="280" x2="580" y2="280" stroke="#FF9900" stroke-width="8" stroke-linecap="round" /><line x1="580" y1="280" x2="720" y2="280" stroke="#EF4444" stroke-width="8" stroke-linecap="round" /><rect x="60" y="120" width="130" height="90" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="80" y="150" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Prompt Eng</text>
  <text x="80" y="170" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Low cost, low effort</text><circle cx="125" cy="280" r="10" fill="#00A3E0" /><rect x="220" y="120" width="130" height="90" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="240" y="150" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">RAG Setup</text>
  <text x="240" y="170" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Vector database links</text><circle cx="285" cy="280" r="10" fill="#00A3E0" /><rect x="380" y="120" width="150" height="90" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="400" y="150" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Fine-Tuning (PEFT)</text>
  <text x="400" y="170" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Updates weights<tspan x="400" dy="15">on private labels</tspan></text><circle cx="455" cy="280" r="10" fill="#FF9900" /><rect x="560" y="120" width="180" height="90" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="580" y="150" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Pretraining</text>
  <text x="580" y="170" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8" textLength="155" lengthAdjust="spacingAndGlyphs">Massive supercomputer resources</text><circle cx="650" cy="280" r="10" fill="#EF4444" /><text x="125" y="340" font-family="Inter" font-size="11" fill="#94A3B8" text-anchor="middle">Customer Data: Low</text><text x="125" y="358" font-family="Inter" font-size="11" fill="#94A3B8" text-anchor="middle">Compute Cost: Low</text><text x="650" y="340" font-family="Inter" font-size="11" fill="#94A3B8" text-anchor="middle">Customer Data: High</text><text x="650" y="358" font-family="Inter" font-size="11" fill="#94A3B8" text-anchor="middle">Compute Cost: High</text>
</svg>