<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Core AI Capabilities &amp; Business Benefits</text>
<rect x="60" y="95" width="320" height="130" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="80" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Pattern Matching</text>
  <text x="80" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Identify trends and make predictions</text><path d="M 90,195 L 140,165 L 180,185 L 240,150 L 300,160" fill="none" stroke="#00A3E0" stroke-width="2.5" /><circle cx="300" cy="160" r="4" fill="#00A3E0" /><text x="135" y="212" font-family="Inter" font-size="9.5" fill="#94A3B8">e.g., Sales &amp; Demand Forecasting</text><rect x="420" y="95" width="320" height="130" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="440" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Anomaly Detection</text>
  <text x="440" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Spot outliers deviating from normal patterns</text><circle cx="470" cy="175" r="4" fill="#475569" /><circle cx="490" cy="165" r="4" fill="#475569" /><circle cx="480" cy="185" r="4" fill="#475569" /><circle cx="510" cy="170" r="4" fill="#475569" /><circle cx="500" cy="180" r="4" fill="#475569" /><circle cx="620" cy="170" r="8" fill="#EF4444" filter="url(#glow-orange)" /><text x="635" y="174" font-family="Inter" font-size="11" font-weight="700" fill="#EF4444">Anomaly</text><text x="495" y="212" font-family="Inter" font-size="9.5" fill="#94A3B8">e.g., Fraud Detection &amp; Security Audits</text><rect x="60" y="245" width="320" height="130" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="80" y="275" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Computer Vision</text>
  <text x="80" y="295" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Analyze visual inputs like images &amp; video</text><rect x="90" y="295" width="40" height="40" rx="4" fill="none" stroke="#10B981" stroke-width="1.5" /><circle cx="110" cy="315" r="8" fill="none" stroke="#10B981" stroke-width="1.5" /><line x1="80" y1="315" x2="140" y2="315" stroke="#10B981" stroke-width="1" stroke-dasharray="2 2" /><text x="135" y="362" font-family="Inter" font-size="9.5" fill="#94A3B8">e.g., Finding Product Defects on Lines</text><rect x="420" y="245" width="320" height="130" rx="12" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="440" y="275" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Language Processing</text>
  <text x="440" y="295" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Understand intent, translate, and synthesize speech</text><rect x="470" y="295" width="45" height="25" rx="4" fill="none" stroke="#8B5CF6" stroke-width="1.5" /><text x="492" y="311" font-family="Inter" font-size="9" fill="#8B5CF6" text-anchor="middle">Hi</text><rect x="525" y="310" width="45" height="25" rx="4" fill="none" stroke="#00A3E0" stroke-width="1.5" /><text x="547" y="326" font-family="Inter" font-size="9" fill="#00A3E0" text-anchor="middle">Hola</text><text x="495" y="362" font-family="Inter" font-size="9.5" fill="#94A3B8">e.g., Live Translation &amp; Chat Routing</text>
</svg>