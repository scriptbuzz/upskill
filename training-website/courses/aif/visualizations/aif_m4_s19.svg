<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Amazon Augmented AI (A2I) Workflow</text>
  <text x="760" y="40" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">v0.3 beta | Mikeb</text>
<rect x="40" y="160" width="110" height="100" rx="12" fill="url(#dark-card)" stroke="#475569" stroke-width="1.5" />
  <text x="60" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Document / Image</text>
  <text x="60" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Inbound stream</text><line x1="150" y1="210" x2="210" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="210" y1="210" x2="203.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="210" y1="210" x2="203.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="210" y="160" width="140" height="100" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="230" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Model Inference</text>
  <text x="230" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">e.g., Textract parser</text><line x1="350" y1="210" x2="410" y2="210" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="410" y1="210" x2="403.0717967697245" y2="214.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="410" y1="210" x2="403.0717967697245" y2="206.0" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="410" y="150" width="160" height="120" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="430" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Confidence Check</text>
  <text x="430" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Threshold = 90%</text><line x1="570" y1="180" x2="640" y2="140" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="640" y1="140" x2="635.9691908114961" y2="146.91032396388712" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="640" y1="140" x2="632.0000793046414" y2="139.96437882689145" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="605.0" y="152.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">&gt; 90%</text><line x1="570" y1="240" x2="640" y2="280" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="640" y1="280" x2="632.0000793046414" y2="280.03562117310855" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="640" y1="280" x2="635.9691908114961" y2="273.0896760361129" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <text x="605.0" y="252.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">&lt; 90%</text><rect x="640" y="95" width="120" height="75" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="660" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Auto-Approve</text>
  <text x="660" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Direct to DB</text><rect x="640" y="275" width="120" height="75" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="660" y="305" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Human Review</text>
  <text x="660" y="325" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">A2I workspace</text>
    <g transform="translate(685, 310)">
      <circle cx="15" cy="10" r="7" fill="none" stroke="#F8FAFC" stroke-width="1.5" />
      <path d="M 3,24 Q 15,14 27,24" fill="none" stroke="#F8FAFC" stroke-width="1.5" />
    </g>
    
</svg>