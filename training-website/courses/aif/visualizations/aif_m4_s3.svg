<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80.0" cy="90.0" r="240.0" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720.0" cy="360.0" r="240.0" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Class Imbalance &amp; Representation</text>
  <rect x="120" y="100" width="560" height="260" rx="12" fill="url(#dark-card)" stroke="#1E293B" stroke-width="1.5" />
  <text x="140" y="135" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#F8FAFC">CLASS IMBALANCE &amp; REPRESENTATION</text>
  <text x="140" y="155" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8">Release Documentation &amp; Compliance Audit</text>

  <g transform="translate(150, 175)">
    <text x="0" y="15" font-family="Inter" font-size="12" fill="#94A3B8">Release Version:</text>
    <text x="140" y="15" font-family="Inter" font-size="12" font-weight="700" fill="#F8FAFC">v0.1 beta</text>
    
    <text x="0" y="45" font-family="Inter" font-size="12" fill="#94A3B8">Verification Status:</text>
    <text x="140" y="45" font-family="Inter" font-size="12" font-weight="700" fill="#10B981">PASSED (SageMaker / AWS Tools)</text>
    
    <text x="0" y="75" font-family="Inter" font-size="12" fill="#94A3B8">Audit Timestamp:</text>
    <text x="140" y="75" font-family="Inter" font-size="12" font-weight="700" fill="#F8FAFC">2026-06-22</text>
    
    <text x="0" y="105" font-family="Inter" font-size="12" fill="#94A3B8">Responsible Scope:</text>
    <text x="140" y="105" font-family="Inter" font-size="12" font-weight="700" fill="#00A3E0">Least Privilege Access Enabled</text>
  </g>

  <g transform="translate(480, 175)">
    <rect x="0" y="5" width="16" height="16" rx="4" fill="none" stroke="#10B981" stroke-width="2" />
    <text x="5" y="18" font-family="Inter" font-size="12" fill="#10B981" font-weight="700">✓</text>
    <text x="25" y="18" font-family="Inter" font-size="11.5" fill="#F8FAFC">Audited</text>
    
    <rect x="0" y="40" width="16" height="16" rx="4" fill="none" stroke="#10B981" stroke-width="2" />
    <text x="5" y="53" font-family="Inter" font-size="12" fill="#10B981" font-weight="700">✓</text>
    <text x="25" y="53" font-family="Inter" font-size="11.5" fill="#F8FAFC">Traceable</text>
    
    <rect x="0" y="75" width="16" height="16" rx="4" fill="none" stroke="#10B981" stroke-width="2" />
    <text x="5" y="88" font-family="Inter" font-size="12" fill="#10B981" font-weight="700">✓</text>
    <text x="25" y="88" font-family="Inter" font-size="11.5" fill="#F8FAFC">Compliant</text>
  </g>

  <rect x="120" y="380" width="560" height="45" rx="8" fill="rgba(30,41,59,0.3)" stroke="#1E293B" stroke-width="1" />
  <text x="140" y="407" font-family="Inter" font-size="11" fill="#94A3B8">A balance scale heavily tilted. The heavy side contains a stack of "Majority Group" profil...</text>
</svg>