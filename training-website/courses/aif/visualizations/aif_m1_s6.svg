<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Machine Learning Training Paradigms</text>
  <text x="760" y="40" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">v0.3 beta | Mikeb</text>
<rect x="50" y="95" width="210" height="290" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="70" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Supervised Learning</text>
  <text x="70" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Uses labeled data</text><rect x="75" y="175" width="160" height="45" rx="12" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1.5" />
  <text x="95" y="205" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Input: [Image of Apple]</text>
  <text x="95" y="225" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Labeled: 'Apple'</text><line x1="155" y1="220" x2="155" y2="255" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <line x1="155" y1="255" x2="151.0" y2="248.0717967697245" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <line x1="155" y1="255" x2="159.0" y2="248.0717967697245" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
  <text x="155.0" y="229.5" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Compare to Target</text><rect x="75" y="255" width="160" height="45" rx="12" fill="rgba(239,68,68,0.05)" stroke="#EF4444" stroke-width="1.5" />
  <text x="95" y="285" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Error Penalty (Feedback)</text>
  <text x="95" y="305" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Model adjusts weights</text><text x="155" y="355" font-family="Inter" font-size="9.5" fill="#94A3B8" text-anchor="middle">Predictive. Teacher guides model.</text><rect x="295" y="95" width="210" height="290" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="315" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Unsupervised Learning</text>
  <text x="315" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Finds hidden patterns</text><circle cx="345" cy="185" r="6" fill="#475569" /><rect x="365" y="180" width="10" height="10" fill="#475569" /><circle cx="350" cy="205" r="6" fill="#475569" /><line x1="400" y1="195" x2="430" y2="195" stroke="#00A3E0" stroke-width="2" stroke-linecap="round" />
  <line x1="430" y1="195" x2="423.0717967697245" y2="199.0" stroke="#00A3E0" stroke-width="2" stroke-linecap="round" />
  <line x1="430" y1="195" x2="423.0717967697245" y2="191.0" stroke="#00A3E0" stroke-width="2" stroke-linecap="round" />
  <text x="415.0" y="187.0" font-family="Inter" font-size="9" fill="#94A3B8" text-anchor="middle">Cluster</text><circle cx="465" cy="185" r="6" fill="#00A3E0" /><circle cx="475" cy="195" r="6" fill="#00A3E0" /><rect x="460" y="225" width="10" height="10" fill="#FF9900" /><rect x="475" y="220" width="10" height="10" fill="#FF9900" /><text x="400" y="355" font-family="Inter" font-size="9.5" fill="#94A3B8" text-anchor="middle">No labels. Finds groupings.</text><rect x="540" y="95" width="210" height="290" rx="12" fill="url(#dark-card)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="560" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Reinforcement Learning</text>
  <text x="560" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Trial and error rewards</text><rect x="565" y="160" width="160" height="40" rx="12" fill="rgba(139,92,246,0.05)" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="585" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Agent (DeepRacer)</text>
  <text x="585" y="210" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Chooses action in environment</text><line x1="645" y1="200" x2="645" y2="235" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" />
  <line x1="645" y1="235" x2="641.0" y2="228.0717967697245" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" />
  <line x1="645" y1="235" x2="649.0" y2="228.0717967697245" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" /><rect x="565" y="235" width="160" height="45" rx="12" fill="rgba(245,158,11,0.05)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="585" y="265" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Outcome Assessment</text>
  <text x="585" y="285" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Reward (+1) / Penalty (-1)</text><text x="645" y="355" font-family="Inter" font-size="9.5" fill="#94A3B8" text-anchor="middle">Action loop. Maximizes rewards.</text>
</svg>