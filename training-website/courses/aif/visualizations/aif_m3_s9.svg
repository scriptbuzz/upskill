<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Prompt Engineering Techniques Comparison</text>
<rect x="50" y="95" width="210" height="290" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="70" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Zero-Shot Prompting</text>
  <text x="70" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Model gets task with no examples</text><rect x="70" y="170" width="170" height="80" rx="12" fill="rgba(239,68,68,0.05)" stroke="#EF4444" stroke-width="1.5" />
  <text x="90" y="192" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#F8FAFC">Prompt:<tspan x="90" dy="18" font-weight="400" fill="#CBD5E1">'Translate to French:</tspan><tspan x="90" dy="16" font-weight="400" fill="#CBD5E1">Good Morning'</tspan></text>
  <text x="90" y="268" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">No examples given</text><text x="155" y="350" font-family="Inter" font-size="10.5" fill="#94A3B8" text-anchor="middle">Rely on pre-trained weights</text><rect x="295" y="95" width="210" height="290" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="315" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Few-Shot Prompting</text>
  <text x="315" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Model gets labeled example pairs</text><rect x="315" y="170" width="170" height="100" rx="12" fill="rgba(0,163,224,0.05)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="335" y="192" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#F8FAFC">Prompt:<tspan x="335" dy="18" font-weight="400" fill="#CBD5E1">'Cat -&gt; Chat</tspan><tspan x="335" dy="16" font-weight="400" fill="#CBD5E1">Dog -&gt; Chien</tspan><tspan x="335" dy="16" font-weight="400" fill="#CBD5E1">Translate: Horse'</tspan></text>
  <text x="335" y="288" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Examples format response</text><text x="400" y="350" font-family="Inter" font-size="10.5" fill="#94A3B8" text-anchor="middle">Enforces output structure</text><rect x="540" y="95" width="210" height="290" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="560" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Chain-of-Thought</text>
  <text x="560" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Model reasons step-by-step</text><rect x="560" y="170" width="170" height="100" rx="12" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1.5" />
  <text x="580" y="192" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#F8FAFC">Prompt:<tspan x="580" dy="18" font-weight="400" fill="#CBD5E1">'Let's think step-by-step:</tspan><tspan x="580" dy="16" font-weight="400" fill="#CBD5E1">1. Find total sales...</tspan><tspan x="580" dy="16" font-weight="400" fill="#CBD5E1">2. Divide by count...'</tspan></text>
  <text x="580" y="288" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Reasoning tokens allocated</text><text x="645" y="350" font-family="Inter" font-size="10.5" fill="#94A3B8" text-anchor="middle">Best for math &amp; logic puzzles</text>
</svg>