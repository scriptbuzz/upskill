<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Classification Metrics Formulas &amp; Definitions</text>
<rect x="50" y="95" width="150" height="280" rx="12" fill="url(#dark-card)" stroke="#F8FAFC" stroke-width="1.5" />
  <text x="70" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Accuracy</text>
  <text x="70" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Overall correctness</text><rect x="65" y="180" width="120" height="60" rx="4" fill="#1E293B" stroke="#334155" /><text x="125" y="205" font-family="monospace" font-size="10.5" fill="#F8FAFC" text-anchor="middle">TP + TN</text><line x1="75" y1="213" x2="175" y2="213" stroke="#94A3B8" stroke-width="1.5" /><text x="125" y="230" font-family="monospace" font-size="10.5" fill="#F8FAFC" text-anchor="middle">Total Samples</text><text x="125" y="270" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">Unreliable if class</text><text x="125" y="285" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">imbalance is high</text><rect x="225" y="95" width="150" height="280" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="245" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Precision</text>
  <text x="245" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Quality of positives</text><rect x="240" y="180" width="120" height="60" rx="4" fill="#1E293B" stroke="#334155" /><text x="300" y="205" font-family="monospace" font-size="11" fill="#00A3E0" text-anchor="middle">TP</text><line x1="250" y1="213" x2="350" y2="213" stroke="#94A3B8" stroke-width="1.5" /><text x="300" y="230" font-family="monospace" font-size="11" fill="#F8FAFC" text-anchor="middle">TP + FP</text><text x="300" y="270" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">Minimize false alarms</text><text x="300" y="285" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">(e.g., spam filter)</text><rect x="400" y="95" width="150" height="280" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="420" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Recall</text>
  <text x="420" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Coverage of positives</text><rect x="415" y="180" width="120" height="60" rx="4" fill="#1E293B" stroke="#334155" /><text x="475" y="205" font-family="monospace" font-size="11" fill="#FF9900" text-anchor="middle">TP</text><line x1="425" y1="213" x2="525" y2="213" stroke="#94A3B8" stroke-width="1.5" /><text x="475" y="230" font-family="monospace" font-size="11" fill="#F8FAFC" text-anchor="middle">TP + FN</text><text x="475" y="270" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">Minimize missed cases</text><text x="475" y="285" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">(e.g., cancer scans)</text><rect x="575" y="95" width="150" height="280" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="595" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">F1 Score</text>
  <text x="595" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Harmonic mean</text><rect x="590" y="180" width="120" height="60" rx="4" fill="#1E293B" stroke="#334155" /><text x="650" y="205" font-family="monospace" font-size="10" fill="#10B981" text-anchor="middle">2 * Prec * Rec</text><line x1="600" y1="213" x2="700" y2="213" stroke="#94A3B8" stroke-width="1.5" /><text x="650" y="230" font-family="monospace" font-size="10" fill="#F8FAFC" text-anchor="middle">Prec + Rec</text><text x="650" y="270" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">Balanced metric for</text><text x="650" y="285" font-family="Inter" font-size="10" fill="#94A3B8" text-anchor="middle">imbalanced datasets</text>
</svg>