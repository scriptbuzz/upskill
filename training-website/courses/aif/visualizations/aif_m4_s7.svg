<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Complexity vs. Explainability Trade-off</text>
<line x1="80" y1="360" x2="720" y2="360" stroke="#334155" stroke-width="2" /><line x1="80" y1="100" x2="80" y2="360" stroke="#334155" stroke-width="2" /><text x="400" y="390" font-family="Inter" font-size="12" font-weight="700" fill="#94A3B8" text-anchor="middle">MODEL COMPLEXITY (Compute / Size)</text><text x="50" y="230" font-family="Inter" font-size="12" font-weight="700" fill="#94A3B8" text-anchor="middle" transform="rotate(-90 50 230)">EXPLAINABILITY</text><circle cx="150" cy="150" r="10" fill="#10B981" filter="url(#glow-blue)" /><text x="170" y="154" font-family="Inter" font-size="11" font-weight="700" fill="#10B981">Decision Tree</text><circle cx="340" cy="230" r="10" fill="#00A3E0" /><text x="360" y="234" font-family="Inter" font-size="11" font-weight="700" fill="#00A3E0">Random Forest</text><circle cx="620" cy="310" r="10" fill="#EF4444" filter="url(#glow-orange)" /><text x="620" y="290" font-family="Inter" font-size="11" font-weight="700" fill="#EF4444" text-anchor="middle">Deep Neural Net (Black Box)</text>
</svg>