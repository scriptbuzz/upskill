<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Transformer Attention Mechanisms</text>

  <!-- Attention connections between client -> developer --><path d="M 240,165 Q 430,220 660,165" fill="none" stroke="#FF9900" stroke-width="4.5" opacity="0.8" filter="url(#glow-orange)" /><text x="450" y="215" font-family="Inter" font-size="10.5" font-weight="700" fill="#FF9900" text-anchor="middle">Strong Attention Weight (0.92)</text><path d="M 240,165 Q 300,190 380,165" fill="none" stroke="#00A3E0" stroke-width="2" opacity="0.6" /><path d="M 380,165 Q 510,190 660,165" fill="none" stroke="#00A3E0" stroke-width="2" opacity="0.6" /><rect x="50" y="110" width="110" height="50" rx="12" fill="url(#dark-card)" stroke="#334155" stroke-width="1.5" />
  <text x="70" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">The</text><rect x="170" y="110" width="110" height="50" rx="12" fill="url(#dark-card)" stroke="#334155" stroke-width="1.5" />
  <text x="190" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">client</text><rect x="310" y="110" width="110" height="50" rx="12" fill="url(#dark-card)" stroke="#334155" stroke-width="1.5" />
  <text x="330" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">called</text><rect x="450" y="110" width="110" height="50" rx="12" fill="url(#dark-card)" stroke="#334155" stroke-width="1.5" />
  <text x="470" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">the</text><rect x="590" y="110" width="110" height="50" rx="12" fill="url(#dark-card)" stroke="#334155" stroke-width="1.5" />
  <text x="610" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">developer</text>
    <g transform="translate(60, 270)">
      <rect x="0" y="0" width="680" height="110" rx="8" fill="rgba(30,41,59,0.3)" stroke="#1E293B" stroke-width="1" />
      <text x="20" y="30" font-family="Inter" font-size="13" font-weight="700" fill="#F8FAFC">Self-Attention Context Mapping</text>
      <text x="20" y="55" font-family="Inter" font-size="11" fill="#94A3B8">Instead of reading word-by-word sequentially, Transformers calculate weights between all words</text>
      <text x="20" y="72" font-family="Inter" font-size="11" fill="#94A3B8">simultaneously. "client" maps directly to "developer" across the sentence to resolve context.</text>
    </g>
    
</svg>