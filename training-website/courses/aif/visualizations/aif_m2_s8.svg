<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">LLM Performance Trade-offs &amp; Metrics</text>
<rect x="60" y="110" width="140" height="260" rx="12" fill="url(#dark-card)" stroke="#10B981" stroke-width="1.5" />
  <text x="80" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Model Accuracy</text>
  <text x="80" y="160" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Evaluation scores</text><text x="130" y="220" font-family="Inter" font-size="10.5" fill="#10B981">ROUGE: 0.82</text><text x="130" y="240" font-family="Inter" font-size="10.5" fill="#10B981">BLEU: 0.74</text><text x="130" y="280" font-family="Inter" font-size="9" fill="#94A3B8" textLength="65" lengthAdjust="spacingAndGlyphs">Higher parameters =</text><text x="130" y="295" font-family="Inter" font-size="9" fill="#94A3B8">Higher accuracy</text><rect x="220" y="110" width="140" height="260" rx="12" fill="url(#dark-card)" stroke="#EF4444" stroke-width="1.5" />
  <text x="240" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Inference Latency</text>
  <text x="240" y="160" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Time to first token</text><rect x="240" y="210" width="80" height="12" rx="2" fill="#EF4444" /><text x="240" y="238" font-family="Inter" font-size="9.5" fill="#EF4444">Large model: 2.1s</text><rect x="240" y="255" width="30" height="12" rx="2" fill="#10B981" /><text x="240" y="282" font-family="Inter" font-size="9.5" fill="#10B981">Small model: 0.4s</text><rect x="380" y="110" width="140" height="260" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="400" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Compute Cost</text>
  <text x="400" y="160" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Tokens per USD pricing</text><text x="450" y="220" font-family="Inter" font-size="11" fill="#F8FAFC">$ / 1M Tokens</text><text x="450" y="250" font-family="Inter" font-size="10" fill="#94A3B8" textLength="65" lengthAdjust="spacingAndGlyphs">Infrastructure cost</text><text x="450" y="265" font-family="Inter" font-size="10" fill="#94A3B8">scales with depth</text><rect x="540" y="110" width="200" height="260" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="560" y="140" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Context Window Size</text>
  <text x="560" y="160" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Input token buffer limit</text><rect x="560" y="210" width="25" height="25" rx="3" fill="#00A3E0" opacity="0.3" /><rect x="590" y="210" width="25" height="25" rx="3" fill="#00A3E0" opacity="0.3" /><rect x="620" y="210" width="25" height="25" rx="3" fill="#00A3E0" opacity="0.3" /><rect x="650" y="210" width="25" height="25" rx="3" fill="#94A3B8" opacity="0.1" /><text x="640" y="270" font-family="Inter" font-size="11" fill="#F8FAFC" text-anchor="middle">e.g., 200K Tokens buffer</text><text x="640" y="300" font-family="Inter" font-size="9.5" fill="#94A3B8" text-anchor="middle">Governs retrieval density</text>
</svg>