<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="aws-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC400" />
    </linearGradient>
    <linearGradient id="cloud-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3E0" />
      <stop offset="100%" stop-color="#1D70B8" />
    </linearGradient>
    <linearGradient id="success-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="alert-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="warning-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="dark-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0F172A" />
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Subtle Soft Glows -->
  <circle cx="80" cy="90" r="240" fill="rgba(0, 163, 224, 0.05)" filter="url(#glow-blue)" />
  <circle cx="720" cy="360" r="240" fill="rgba(255, 153, 0, 0.04)" filter="url(#glow-orange)" />
  
  <!-- Slide Header -->
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Model Inference &amp; Deployment Options</text>
<rect x="60" y="95" width="310" height="290" rx="12" fill="url(#dark-card)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="80" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Real-Time Inference</text>
  <text x="80" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Persistent HTTPS endpoint</text><rect x="90" y="150" width="250" height="50" rx="12" fill="rgba(0,163,224,0.05)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="110" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Client Request (JSON)</text>
  <text x="110" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Single record, low latency</text><line x1="215" y1="200" x2="215" y2="240" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="215" y1="240" x2="211.0" y2="233.0717967697245" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="215" y1="240" x2="219.0" y2="233.0717967697245" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="90" y="240" width="250" height="50" rx="12" fill="rgba(0,163,224,0.05)" stroke="#00A3E0" stroke-width="1.5" />
  <text x="110" y="270" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">SageMaker Active Instance</text>
  <text x="110" y="290" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Continuous compute, active 24/7</text><line x1="215" y1="290" x2="215" y2="320" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="215" y1="320" x2="211.0" y2="313.0717967697245" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="215" y1="320" x2="219.0" y2="313.0717967697245" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><text x="215" y="340" font-family="Inter" font-size="11.5" fill="#10B981" text-anchor="middle">✔ Best for immediate user chat apps</text><rect x="430" y="95" width="310" height="290" rx="12" fill="url(#dark-card)" stroke="#FF9900" stroke-width="1.5" />
  <text x="450" y="125" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Batch Transform</text>
  <text x="450" y="145" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Non-persistent, scheduled execution</text><rect x="460" y="150" width="250" height="50" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="480" y="180" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Input Bucket (S3)</text>
  <text x="480" y="200" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Bulk rows of records (gigabytes)</text><line x1="585" y1="200" x2="585" y2="240" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="585" y1="240" x2="581.0" y2="233.0717967697245" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="585" y1="240" x2="589.0" y2="233.0717967697245" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><rect x="460" y="240" width="250" height="50" rx="12" fill="rgba(255,153,0,0.05)" stroke="#FF9900" stroke-width="1.5" />
  <text x="480" y="270" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8FAFC">Ephemeral Container cluster</text>
  <text x="480" y="290" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#94A3B8">Spins up, processes, shuts down</text><line x1="585" y1="290" x2="585" y2="320" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="585" y1="320" x2="581.0" y2="313.0717967697245" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" />
  <line x1="585" y1="320" x2="589.0" y2="313.0717967697245" stroke="url(#aws-orange)" stroke-width="2" stroke-linecap="round" /><text x="585" y="340" font-family="Inter" font-size="11.5" fill="#10B981" text-anchor="middle">✔ Best for bulk nightly logs analysis</text>
</svg>